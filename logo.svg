<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" fill="none">
  <defs>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8cce8"/>
      <stop offset="55%" stop-color="#7fa4cc"/>
      <stop offset="100%" stop-color="#5a87b0"/>
    </linearGradient>
    <filter id="drop-shadow" x="-25%" y="-10%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(90,135,176,0.38)"/>
    </filter>
  </defs>

  <!--
    Combined mark: location pin (pointing down) + water drop (pointing up, cutout inside).
    The two inverse teardrop shapes interlock — one positive, one negative space.
    fill-rule="evenodd" creates the drop-shaped window through the pin body.
  -->
  <path
    fill-rule="evenodd"
    clip-rule="evenodd"
    d="
      M 50 4
      C 27 4 10 21 10 44
      C 10 70 50 126 50 126
      C 50 126 90 70 90 44
      C 90 21 73 4 50 4
      Z

      M 50 20
      C 37 31 29 44 29 56
      C 29 69 38.5 78 50 78
      C 61.5 78 71 69 71 56
      C 71 44 63 31 50 20
      Z
    "
    fill="url(#pinGrad)"
    filter="url(#drop-shadow)"
  />
</svg>
