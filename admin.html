<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>convotrek Admin</title>
  <style>
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Black.woff2') format('woff2'); font-weight:800; font-display:swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Geist', sans-serif;
      background: #080c14;
      color: #f0faf9;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── AUTH GATE (shown by default, hides when admin confirmed) ── */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    .gate-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(151,172,224,.2);
      border-top-color: #97ace0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gate-text { color: rgba(240,250,249,.45); font-size: 14px; }

    /* ── ADMIN SHELL (hidden until DB confirms is_admin = true) ── */
    #admin-shell { display: none; }

    /* ── HEADER ── */
    .admin-header {
      background: rgba(8,12,20,.95);
      border-bottom: 1px solid rgba(151,172,224,.12);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
    }
    .admin-logo { font-weight: 800; font-size: 16px; color: #97ace0; margin-right: auto; }
    .admin-user { font-size: 13px; color: rgba(240,250,249,.5); }
    .btn-signout {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.25);
      color: #f87171;
      padding: 7px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background .2s;
    }
    .btn-signout:hover { background: rgba(239,68,68,.22); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      padding: 20px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .stat-card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(151,172,224,.1);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: rgba(240,250,249,.4); }
    .stat-value { font-size: 32px; font-weight: 800; color: #97ace0; }

    /* ── TAB NAV ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      padding: 0 24px;
      border-bottom: 1px solid rgba(151,172,224,.08);
      max-width: 1200px;
      margin: 0 auto;
    }
    .tab-nav-btn {
      background: none; border: none;
      color: rgba(240,250,249,.4);
      padding: 12px 20px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .2s, border-color .2s;
    }
    .tab-nav-btn:hover { color: #f0faf9; }
    .tab-nav-btn.active { color: #97ace0; border-bottom-color: #97ace0; }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ── TABLE ── */
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      text-align: left;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: rgba(240,250,249,.3);
      padding: 10px 12px;
      border-bottom: 1px solid rgba(151,172,224,.08);
    }
    .admin-table td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      vertical-align: middle;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: rgba(255,255,255,.02); }

    /* ── BADGES ── */
    .badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px;
      letter-spacing: .06em;
    }
    .badge-admin  { background: rgba(151,172,224,.12); color: #97ace0; border: 1px solid rgba(151,172,224,.25); }
    .badge-banned { background: rgba(239,68,68,.12);  color: #f87171;  border: 1px solid rgba(239,68,68,.25); }
    .badge-you    { background: rgba(168,85,247,.12); color: #c084fc;  border: 1px solid rgba(168,85,247,.25); }

    /* ── ACTION BUTTONS ── */
    .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-action {
      font-size: 11px; font-weight: 700;
      padding: 5px 11px; border-radius: 6px;
      cursor: pointer; font-family: inherit; border: 1px solid;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .btn-action:hover { opacity: .8; }
    .btn-ban    { background: rgba(251,191,36,.08);  color: #fbbf24; border-color: rgba(251,191,36,.25); }
    .btn-unban  { background: rgba(34,197,94,.08);   color: #4ade80; border-color: rgba(34,197,94,.25); }
    .btn-mkadm  { background: rgba(151,172,224,.08);  color: #97ace0; border-color: rgba(151,172,224,.25); }
    .btn-rvadm  { background: rgba(168,85,247,.08);  color: #c084fc; border-color: rgba(168,85,247,.25); }
    .btn-del    { background: rgba(239,68,68,.08);   color: #f87171; border-color: rgba(239,68,68,.25); }
    .btn-del-c  { background: rgba(239,68,68,.05);   color: #fca5a5; border-color: rgba(239,68,68,.15); }

    /* ── SEARCH / FILTER ── */
    .table-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .table-search {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: #f0faf9;
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      flex: 1;
      min-width: 200px;
      transition: border-color .2s;
    }
    .table-search:focus { border-color: rgba(151,172,224,.4); }
    .table-search::placeholder { color: rgba(240,250,249,.25); }
    .table-count { font-size: 12px; color: rgba(240,250,249,.35); margin-left: auto; }

    /* ── TOAST ── */
    .admin-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #0d2b28; border: 1px solid rgba(151,172,224,.3);
      color: #f0faf9; padding: 11px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity .25s;
      pointer-events: none; z-index: 9999;
    }
    .admin-toast.show { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 48px 20px; color: rgba(240,250,249,.25); font-size: 14px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .admin-table th:nth-child(3),
      .admin-table td:nth-child(3) { display: none; }
      .stats-bar { grid-template-columns: 1fr 1fr; }
    }

    /* ── Light mode ── */
    body.light-mode { background: #f0f4f8; color: #1a1830; }
    body.light-mode .admin-header { background: rgba(240,244,248,.95); border-bottom-color: rgba(106,154,184,.2); }
    body.light-mode .admin-logo { color: #5283a0; }
    body.light-mode .stat-card { background: #fff; border-color: rgba(106,154,184,.15); }
    body.light-mode .stat-value { color: #5283a0; }
    body.light-mode .stat-label { color: rgba(26,24,48,.45); }
    body.light-mode .tab-nav-btn { color: rgba(26,24,48,.45); }
    body.light-mode .tab-nav-btn.active { color: #5283a0; border-bottom-color: #5283a0; }
    body.light-mode .admin-table th { color: rgba(26,24,48,.4); border-bottom-color: rgba(106,154,184,.12); }
    body.light-mode .admin-table td { border-bottom-color: rgba(0,0,0,.05); color: #1a1830; }
    body.light-mode .admin-table tr:hover td { background: rgba(106,154,184,.05); }
    body.light-mode .table-search { background: #fff; border-color: rgba(106,154,184,.25); color: #1a1830; }
    body.light-mode .admin-toast { background: #fff; border-color: rgba(106,154,184,.3); color: #1a1830; }
    body.light-mode .gate-text { color: rgba(26,24,48,.45); }
    body.light-mode .admin-user { color: rgba(26,24,48,.5); }  </style>
</head>
<body>

<!-- AUTH GATE: shown while verifying. JS redirects if not admin. -->
<div id="auth-gate">
  <div class="gate-spinner"></div>
  <div class="gate-text">Verifying access…</div>
</div>

<!-- ADMIN SHELL: hidden at parse time, shown only after DB confirms is_admin = true -->
<div id="admin-shell">

  <header class="admin-header">
    <div class="admin-logo" style="display:flex;align-items:center;gap:9px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      convotrek Admin
    </div>
    <div class="admin-user" id="admin-user-label"></div>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" style="background:rgba(255,255,255,.08);border:1px solid rgba(151,172,224,.2);border-radius:20px;width:48px;height:26px;cursor:pointer;display:flex;align-items:center;padding:3px;margin-right:8px;flex-shrink:0;transition:background .2s;"><span style="width:20px;height:20px;border-radius:50%;background:rgba(151,172,224,.15);display:flex;align-items:center;justify-content:center;color:#97ace0;transition:transform .3s;"><svg class="toggle-moon" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg><svg class="toggle-sun" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg></span></button>
    <button class="btn-signout" id="btn-signout">Sign Out</button>
  </header>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="stat-users">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Boards</div>
      <div class="stat-value" id="stat-boards">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Ideas</div>
      <div class="stat-value" id="stat-ideas">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Votes</div>
      <div class="stat-value" id="stat-votes">—</div>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-nav-btn active" data-tab="users" style="display:inline-flex;align-items:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg> Users</button>
    <button class="tab-nav-btn" data-tab="boards" style="display:inline-flex;align-items:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Boards</button>
    <button class="tab-nav-btn" data-tab="ideas" style="display:inline-flex;align-items:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> Ideas</button>
  </div>

  <!-- USERS TAB -->
  <div class="tab-panel active" id="tab-users">
    <div class="table-toolbar">
      <input class="table-search" id="user-search" type="text" placeholder="Search by username…" />
      <span class="table-count" id="user-count"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Joined</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- BOARDS TAB -->
  <div class="tab-panel" id="tab-boards">
    <div class="table-toolbar">
      <input class="table-search" id="board-search" type="text" placeholder="Search by board name…" />
      <span class="table-count" id="board-count"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Board Name</th>
            <th>Owner</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="boards-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- IDEAS TAB -->
  <div class="tab-panel" id="tab-ideas">
    <div class="table-toolbar">
      <input class="table-search" id="idea-search" type="text" placeholder="Search by city or note…" />
      <span class="table-count" id="idea-count"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="admin-table">
        <thead>
          <tr>
            <th>City</th>
            <th>Author</th>
            <th>Note</th>
            <th>Votes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ideas-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="admin-toast" id="admin-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script src="theme.js"></script>
</body>
</html>
