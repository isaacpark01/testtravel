<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropped — World Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060d10; font-family: 'Geist', 'Inter', system-ui, sans-serif; }

    /* ── Canvas container ── */
    #globe-wrap { width: 100%; height: 100%; }

    /* ── Top bar ── */
    .globe-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(6,13,16,.95) 0%, transparent 100%);
      pointer-events: none;
    }
    .globe-logo {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 18px; font-weight: 800; letter-spacing: -.4px;
      background: linear-gradient(135deg, #52cece, #7dd8d8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; pointer-events: auto;
    }
    .globe-nav-links {
      margin-left: auto; pointer-events: auto;
      display: flex; align-items: center; gap: 8px;
    }
    .globe-back {
      background: rgba(82,206,206,.1); border: 1px solid rgba(82,206,206,.3);
      color: #52cece; padding: 7px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
      transition: background .2s;
    }
    .globe-back:hover { background: rgba(82,206,206,.22); }
    .globe-hint {
      font-size: 12px; color: rgba(255,255,255,.3);
      pointer-events: none;
    }

    /* ── City info panel ── */
    .city-panel {
      position: fixed; right: 0; top: 0; bottom: 0; z-index: 200;
      width: 320px;
      background: rgba(6,13,16,.92);
      backdrop-filter: blur(24px);
      border-left: 1px solid rgba(82,206,206,.15);
      padding: 80px 24px 24px;
      display: flex; flex-direction: column; gap: 0;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.22,.8,.25,1);
    }
    .city-panel.open { transform: translateX(0); }
    .city-panel-close {
      position: absolute; top: 18px; right: 18px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.6); width: 32px; height: 32px; border-radius: 50%;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .city-panel-close:hover { background: rgba(220,38,38,.4); color: #fff; }

    .city-panel-img {
      width: 100%; height: 160px; border-radius: 14px; object-fit: cover;
      background: #0a1a20; margin-bottom: 18px; display: block;
    }
    .city-panel-country {
      font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: #52cece; margin-bottom: 6px;
    }
    .city-panel-name {
      font-size: 26px; font-weight: 800; color: #fff;
      letter-spacing: -.03em; line-height: 1.1; margin-bottom: 8px;
    }
    .city-panel-tagline {
      font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.6; margin-bottom: 20px;
    }
    .city-panel-stats {
      display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .city-stat {
      background: rgba(82,206,206,.08); border: 1px solid rgba(82,206,206,.18);
      border-radius: 8px; padding: 8px 14px; text-align: center; flex: 1; min-width: 70px;
    }
    .city-stat-num { font-size: 18px; font-weight: 800; color: #52cece; display: block; }
    .city-stat-label { font-size: 10px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .08em; }
    .city-panel-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #2a9ab8; border: none; color: #fff;
      padding: 14px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .city-panel-btn:hover { background: #1e7d96; transform: translateY(-1px); }

    /* ── Country tooltip ── */
    .country-tooltip {
      position: fixed; z-index: 300; pointer-events: none;
      background: rgba(6,13,16,.88); backdrop-filter: blur(12px);
      border: 1px solid rgba(82,206,206,.25); border-radius: 10px;
      padding: 8px 14px; font-size: 13px; font-weight: 600; color: #fff;
      opacity: 0; transition: opacity .15s;
      white-space: nowrap;
    }
    .country-tooltip.show { opacity: 1; }

    /* ── Loading ── */
    .globe-loading {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #060d10; gap: 16px;
    }
    .globe-loading-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(82,206,206,.15);
      border-top-color: #52cece;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .globe-loading-text { font-size: 13px; color: rgba(255,255,255,.4); }

    /* ── City count badge ── */
    .city-count-badge {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(6,13,16,.8); backdrop-filter: blur(12px);
      border: 1px solid rgba(82,206,206,.2); border-radius: 30px;
      padding: 8px 20px; font-size: 13px; color: rgba(255,255,255,.5);
      pointer-events: none; z-index: 100;
    }
    .city-count-badge span { color: #52cece; font-weight: 700; }

    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Black.woff2') format('woff2');
      font-weight: 800; font-display: swap;
    }
  </style>
</head>
<body>

<div class="globe-loading" id="globe-loading">
  <div class="globe-loading-ring"></div>
  <div class="globe-loading-text">Loading Earth…</div>
</div>

<!-- Header -->
<div class="globe-header">
  <div class="globe-logo">🌍 Dropped</div>
  <span class="globe-hint">Click a city pin · Drag to rotate · Scroll to zoom</span>
  <div class="globe-nav-links">
    <a href="planner.html" class="globe-back">🗓 Planner</a>
    <a href="/" class="globe-back">← Explore</a>
  </div>
</div>

<!-- Globe canvas -->
<div id="globe-wrap"></div>

<!-- City info panel -->
<div class="city-panel" id="city-panel">
  <button class="city-panel-close" onclick="closePanel()">✕</button>
  <img id="cp-img" class="city-panel-img" src="" alt="" />
  <div id="cp-country" class="city-panel-country"></div>
  <div id="cp-name"    class="city-panel-name"></div>
  <div id="cp-tagline" class="city-panel-tagline"></div>
  <div class="city-panel-stats">
    <div class="city-stat">
      <span id="cp-activities" class="city-stat-num">—</span>
      <span class="city-stat-label">Activities</span>
    </div>
    <div class="city-stat">
      <span id="cp-food" class="city-stat-num">—</span>
      <span class="city-stat-label">Restaurants</span>
    </div>
    <div class="city-stat">
      <span id="cp-iata" class="city-stat-num">—</span>
      <span class="city-stat-label">Airport</span>
    </div>
  </div>
  <a id="cp-link" class="city-panel-btn" href="/">
    🗺 Explore this City
  </a>
</div>

<!-- Country tooltip -->
<div class="country-tooltip" id="country-tooltip"></div>

<!-- City count -->
<div class="city-count-badge">
  <span id="city-count">0</span> destinations on the globe
</div>

<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
<script src="data.js?v=3"></script>
<script>
(function () {
  /* ── City coordinates ──────────────────────────────── */
  const COORDS = {
    // USA — keys match data.js city IDs exactly
    nyc:          [40.7128,  -74.0060],
    losangeles:   [34.0522, -118.2437],
    chicago:      [41.8781,  -87.6298],
    miami:        [25.7617,  -80.1918],
    sanfrancisco: [37.7749, -122.4194],
    lasvegas:     [36.1699, -115.1398],
    seattle:      [47.6062, -122.3321],
    austin:       [30.2672,  -97.7431],
    neworleans:   [29.9511,  -90.0715],
    denver:       [39.7392, -104.9903],
    nashville:    [36.1627,  -86.7816],
    orlando:      [28.5383,  -81.3792],
    hawaii:       [20.7967, -156.3319],
    sandiego:     [32.7157, -117.1611],
    washingtondc: [38.9072,  -77.0369],
    boston:       [42.3601,  -71.0589],
    portland:     [45.5051, -122.6750],
    atlanta:      [33.7490,  -84.3880],
    philadelphia: [39.9526,  -75.1652],
    phoenix:      [33.4484, -112.0740],
    // Europe
    london:       [51.5074,   -0.1278],
    paris:        [48.8566,    2.3522],
    barcelona:    [41.3851,    2.1734],
    amsterdam:    [52.3676,    4.9041],
    rome:         [41.9028,   12.4964],
    lisbon:       [38.7169,   -9.1399],
    prague:       [50.0755,   14.4378],
    budapest:     [47.4979,   19.0402],
    istanbul:     [41.0082,   28.9784],
    vienna:       [48.2082,   16.3738],
    edinburgh:    [55.9533,   -3.1883],
    copenhagen:   [55.6761,   12.5683],
    // Asia & Pacific
    tokyo:        [35.6762,  139.6503],
    kyoto:        [35.0116,  135.7681],
    seoul:        [37.5665,  126.9780],
    bangkok:      [13.7563,  100.5018],
    singapore:    [ 1.3521,  103.8198],
    bali:         [-8.4095,  115.1889],
    sydney:       [-33.8688, 151.2093],
    // Middle East & Africa
    dubai:        [25.2048,   55.2708],
    marrakech:    [31.6295,   -7.9811],
    capetown:     [-33.9249,  18.4241],
    // Americas
    mexicocity:   [19.4326,  -99.1332],
    havana:       [23.1136,  -82.3666],
  };

  /* ── Build points from CITIES data ────────────────── */
  const points = (typeof CITIES !== 'undefined' ? CITIES : []).map(city => {
    const coord = COORDS[city.id] || COORDS[city.id.replace('-','_')];
    if (!coord) return null;
    return {
      id:         city.id,
      name:       city.name,
      country:    city.country,
      tagline:    city.tagline || '',
      image:      city.image  || '',
      iata:       city.iata   || '—',
      activities: (city.activities || []).length,
      food:       (city.food || []).length,
      lat:        coord[0],
      lng:        coord[1],
    };
  }).filter(Boolean);

  /* ── DOM refs ─────────────────────────────────────── */
  const tooltip   = document.getElementById('country-tooltip');
  const panel     = document.getElementById('city-panel');
  const loading   = document.getElementById('globe-loading');

  function openPanel(city) {
    document.getElementById('cp-img').src       = city.image;
    document.getElementById('cp-img').alt       = city.name;
    document.getElementById('cp-country').textContent = city.country;
    document.getElementById('cp-name').textContent    = city.name;
    document.getElementById('cp-tagline').textContent = city.tagline || '';
    document.getElementById('cp-activities').textContent = city.activities;
    document.getElementById('cp-food').textContent       = city.food;
    document.getElementById('cp-iata').textContent       = city.iata;
    document.getElementById('cp-link').href = '/?city=' + city.id + '#cities';
    panel.classList.add('open');
  }
  window.closePanel = function() { panel.classList.remove('open'); };

  /* ── Globe ────────────────────────────────────────── */
  const globe = Globe({ animateIn: true })
    (document.getElementById('globe-wrap'))

    /* Earth textures */
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
    .bumpImageUrl ('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')

    /* Atmosphere */
    .showAtmosphere(true)
    .atmosphereColor('#52cece')
    .atmosphereAltitude(0.18)

    /* City pins */
    .pointsData(points)
    .pointLat('lat')
    .pointLng('lng')
    .pointLabel(d => `<div style="background:rgba(6,13,16,.88);border:1px solid rgba(82,206,206,.35);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;color:#fff;font-family:Geist,Inter,sans-serif">${d.name}<br><span style="font-size:11px;color:#52cece;font-weight:500">${d.country}</span></div>`)
    .pointColor(() => '#52cece')
    .pointAltitude(0.014)
    .pointRadius(0.45)
    .pointResolution(12)
    .onPointClick(d => openPanel(d))
    .onPointHover(d => {
      document.getElementById('globe-wrap').style.cursor = d ? 'pointer' : 'default';
    })

    /* Arc rings on click city (pulse effect) */
    .ringsData([])
    .ringColor(() => '#52cece')
    .ringMaxRadius(3)
    .ringPropagationSpeed(2)
    .ringRepeatPeriod(700);

  /* ── Auto-rotate ──────────────────────────────────── */
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.4;
  globe.controls().enableDamping = true;

  /* Pause rotation while interacting */
  globe.controls().addEventListener('start', () => { globe.controls().autoRotate = false; });
  globe.controls().addEventListener('end',   () => {
    setTimeout(() => { globe.controls().autoRotate = true; }, 2000);
  });

  /* ── Pulse ring on click ──────────────────────────── */
  globe.onPointClick(d => {
    openPanel(d);
    globe.ringsData([{ lat: d.lat, lng: d.lng, maxR: 4, propagationSpeed: 2, repeatPeriod: 800 }]);
    setTimeout(() => globe.ringsData([]), 3000);
  });

  /* ── Initial camera position ──────────────────────── */
  globe.pointOfView({ lat: 20, lng: 0, altitude: 2.2 }, 0);

  /* ── Update city count badge ─────────────────────── */
  document.getElementById('city-count').textContent = points.length;

  /* ── Hide loading when ready ──────────────────────── */
  setTimeout(() => { loading.style.display = 'none'; }, 1200);

  /* ── Resize handler ───────────────────────────────── */
  window.addEventListener('resize', () => {
    globe.width(window.innerWidth).height(window.innerHeight);
  });
})();
</script>
</body>
</html>
