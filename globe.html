<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travia — World Explorer</title>
  <style>
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Black.woff2') format('woff2'); font-weight:800; font-display:swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080c14; font-family: 'Geist', system-ui, sans-serif; }
    #globe-wrap { width: 100%; height: 100%; }

    /* Grain overlay */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 180px;
    }

    /* ── Header ── */
    .globe-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; gap: 14px; padding: 0 20px; height: 60px;
      background: rgba(8,12,20,.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(106,154,184,.12);
      pointer-events: none;
    }
    .globe-logo {
      font-size: 20px; font-weight: 700; letter-spacing: -.3px;
      color: #f0faf9; -webkit-text-fill-color: #f0faf9;
      pointer-events: auto; text-decoration: none; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .globe-logo-img {
      width: 30px; height: 30px; object-fit: contain; flex-shrink: 0;
      filter: brightness(0) invert(1); transform: translateY(2px);
    }
    .globe-hint { font-size: 12px; color: rgba(240,250,249,.25); display: none; letter-spacing: .01em; white-space: nowrap; }
    @media (min-width: 700px) { .globe-hint { display: block; } }

    /* ── Search ── */
    .globe-search-wrap {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: 340px; max-width: calc(100vw - 320px);
      pointer-events: auto;
    }
    .globe-search {
      width: 100%; padding: 9px 38px 9px 14px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(106,154,184,.18);
      border-radius: 10px; color: #f0faf9; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .18s, background .18s;
    }
    .globe-search::placeholder { color: rgba(240,250,249,.28); }
    .globe-search:focus { border-color: rgba(151,172,224,.5); background: rgba(255,255,255,.08); }
    .globe-search-icon {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(240,250,249,.3); pointer-events: none; display: flex; align-items: center;
    }
    .globe-search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: rgba(8,12,20,.97); border: 1px solid rgba(106,154,184,.18);
      border-radius: 12px; overflow: hidden; display: none;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .globe-search-results.show { display: block; }
    .globe-search-result {
      padding: 10px 14px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 9px;
      border-bottom: 1px solid rgba(106,154,184,.08); transition: background .12s;
    }
    .globe-search-result:last-child { border-bottom: none; }
    .globe-search-result:hover { background: rgba(151,172,224,.08); }
    .globe-sr-name { font-weight: 700; color: #f0faf9; }
    .globe-sr-country { font-size: 11px; color: rgba(240,250,249,.35); margin-left: auto; }

    /* ── Search toggle (mobile) ── */
    .globe-search-toggle {
      display: none; width: 34px; height: 34px; border-radius: 8px;
      background: rgba(151,172,224,.08); border: 1px solid rgba(151,172,224,.2);
      color: #97ace0; cursor: pointer;
      align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0; pointer-events: auto;
    }
    .globe-search-toggle:hover { background: rgba(151,172,224,.15); }
    .globe-search-toggle.active { background: rgba(151,172,224,.18); border-color: rgba(151,172,224,.4); }

    /* ── Mobile search bar ── */
    @media (max-width: 660px) {
      .globe-search-toggle { display: flex; }
      .globe-search-wrap {
        position: fixed; left: 0; right: 0; top: 60px;
        width: auto; max-width: none;
        transform: translateY(-6px);
        padding: 10px 14px;
        background: rgba(8,12,20,.97);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(106,154,184,.12);
        z-index: 99; opacity: 0; pointer-events: none;
        transition: opacity .2s ease, transform .22s cubic-bezier(.22,.8,.25,1);
      }
      .globe-header.search-open .globe-search-wrap {
        opacity: 1; pointer-events: auto; transform: translateY(0);
      }
      .globe-search { border-radius: 10px; }
    }

    /* ── Nav ── */
    .globe-nav { margin-left: auto; pointer-events: auto; display: flex; gap: 8px; align-items: center; }
    .globe-navbtn {
      background: transparent; border: 1px solid rgba(151,172,224,.35);
      color: #97ace0; padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none;
      font-family: inherit; transition: background .2s; white-space: nowrap; min-height: 36px;
      display: inline-flex; align-items: center;
    }
    .globe-navbtn:hover { background: rgba(151,172,224,.1); }
    .globe-navbtn.primary {
      background: #6a9ab8; border-color: #6a9ab8; color: #fff;
    }
    .globe-navbtn.primary:hover { background: #5283a0; border-color: #5283a0; }

    /* ── City Panel ── */
    .city-panel {
      position: fixed; right: 0; top: 0; bottom: 0; z-index: 200;
      width: min(440px, 100vw);
      background: #080c14;
      border-left: 1px solid rgba(106,154,184,.12);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .38s cubic-bezier(.22,.8,.25,1);
      overflow: hidden;
    }
    .city-panel.open { transform: translateX(0); }

    /* hero */
    .cp-hero { position: relative; flex-shrink: 0; height: 220px; overflow: hidden; background: #080c14; }
    .cp-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: .65; transition: opacity .3s; }
    .cp-hero::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,12,20,1) 0%, rgba(8,12,20,.5) 55%, transparent 100%);
    }
    .cp-hero-text { position: absolute; bottom: 18px; left: 20px; right: 60px; z-index: 10; }
    .cp-country-row {
      font-size: 10px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(240,250,249,.5); margin-bottom: 5px;
      display: flex; align-items: center; gap: 6px;
    }
    .cp-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: #97ace0; }
    .cp-city-name { font-size: clamp(22px,5vw,30px); font-weight: 800; color: #fff; line-height: 1.1; letter-spacing: -.4px; text-shadow: 0 2px 16px rgba(0,0,0,.6); }
    .cp-tagline { color: rgba(240,250,249,.4); font-size: 13px; margin-top: 5px; font-weight: 400; }
    .cp-close {
      position: absolute; top: 14px; right: 14px; z-index: 20;
      width: 30px; height: 30px; border-radius: 8px;
      background: rgba(8,12,20,.7); border: 1px solid rgba(106,154,184,.2);
      color: rgba(240,250,249,.6); font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .cp-close:hover { background: rgba(220,38,38,.4); border-color: rgba(220,38,38,.35); color: #fff; }

    /* filter bar */
    .cp-filter-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid rgba(106,154,184,.1); flex-shrink: 0;
    }
    .cp-search {
      flex: 1; background: rgba(255,255,255,.05); border: 1px solid rgba(106,154,184,.18);
      border-radius: 8px; color: #f0faf9; font-size: 13px; padding: 8px 12px;
      outline: none; font-family: inherit; transition: border-color .15s;
    }
    .cp-search::placeholder { color: rgba(240,250,249,.28); }
    .cp-search:focus { border-color: rgba(151,172,224,.45); }
    .cp-iata {
      font-size: 11px; font-weight: 800; color: #97ace0; letter-spacing: .06em;
      background: rgba(151,172,224,.1); border: 1px solid rgba(151,172,224,.2);
      border-radius: 6px; padding: 6px 10px; white-space: nowrap; flex-shrink: 0;
    }

    /* tabs */
    .cp-tabs { display: flex; flex-shrink: 0; border-bottom: 1px solid rgba(106,154,184,.1); }
    .cp-tab {
      flex: 1; padding: 12px 8px; text-align: center; white-space: nowrap;
      font-size: 12px; font-weight: 700; color: rgba(240,250,249,.32);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s; user-select: none; letter-spacing: .01em;
    }
    .cp-tab.active { color: #f0faf9; border-bottom-color: #97ace0; }
    .cp-tab:hover:not(.active) { color: rgba(240,250,249,.55); }

    /* list */
    .cp-list { flex: 1; overflow-y: auto; padding: 12px 12px 90px; scrollbar-width: thin; scrollbar-color: rgba(106,154,184,.12) transparent; }
    .cp-list::-webkit-scrollbar { width: 4px; }
    .cp-list::-webkit-scrollbar-thumb { background: rgba(106,154,184,.15); border-radius: 4px; }

    /* spot cards */
    .spot-card {
      background: rgba(255,255,255,.03); border: 1px solid rgba(106,154,184,.1);
      border-radius: 12px; overflow: hidden; margin-bottom: 10px; transition: border-color .2s, background .2s;
    }
    .spot-card:hover { background: rgba(151,172,224,.05); border-color: rgba(151,172,224,.22); }
    .spot-photo { width: 100%; height: 120px; object-fit: cover; display: block; background: #0d1525; }
    .spot-body { padding: 12px 14px; }
    .spot-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .spot-name { font-size: 13px; font-weight: 700; color: #f0faf9; line-height: 1.3; }
    .spot-price { font-size: 13px; font-weight: 800; white-space: nowrap; color: #97ace0; flex-shrink: 0; }
    .spot-price.free { color: #6ee7b7; }
    .spot-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
    .spot-tag { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 700; }
    .tag-rating   { background: rgba(151,172,224,.12); color: #97ace0; }
    .tag-duration { background: rgba(151,172,224,.08); color: rgba(151,172,224,.8); }
    .tag-type     { background: rgba(106,154,184,.1);  color: #6a9ab8; }
    .tag-cuisine  { background: rgba(106,154,184,.1);  color: #6a9ab8; }
    .spot-tip {
      font-size: 11px; color: rgba(240,250,249,.3); line-height: 1.65;
      border-left: 2px solid rgba(151,172,224,.2); padding-left: 10px; margin-top: 7px;
    }
    .no-results { text-align: center; padding: 48px 20px; color: rgba(240,250,249,.25); font-size: 14px; }

    /* footer */
    .cp-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 14px 16px; background: rgba(8,12,20,.97);
      border-top: 1px solid rgba(106,154,184,.12);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    .cp-plan-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: #6a9ab8;
      border: none; color: #fff; padding: 13px; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
      font-family: inherit; transition: background .2s; letter-spacing: .01em;
    }
    .cp-plan-btn:hover { background: #5283a0; }

    /* ── Loading ── */
    .globe-loading {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #080c14; gap: 16px;
    }
    .globe-loading-logo {
      font-size: 28px; font-weight: 700; letter-spacing: -.4px; color: #f0faf9; margin-bottom: 6px;
    }
    .globe-loading-ring {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2.5px solid rgba(151,172,224,.12); border-top-color: #97ace0;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .globe-loading-text { font-size: 11px; color: rgba(240,250,249,.28); letter-spacing: .08em; text-transform: uppercase; }

    /* ── Bottom badge ── */
    .city-count-badge {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(8,12,20,.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(106,154,184,.15); border-radius: 20px;
      padding: 7px 20px; font-size: 12px; color: rgba(240,250,249,.38);
      pointer-events: none; z-index: 100; white-space: nowrap; letter-spacing: .03em;
    }
    .city-count-badge span { color: #97ace0; font-weight: 700; }

    /* ── Theme toggle (matches index.html style) ── */
    .globe-theme-btn {
      pointer-events: auto; flex-shrink: 0;
      background: rgba(255,255,255,.06); border: 1px solid rgba(151,172,224,.2);
      border-radius: 20px; width: 52px; height: 28px; cursor: pointer;
      display: flex; align-items: center; padding: 3px; transition: background .2s;
    }
    .globe-theme-btn:hover { background: rgba(255,255,255,.1); }
    .globe-theme-knob {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(151,172,224,.2); display: flex; align-items: center;
      justify-content: center; font-size: 11px; transition: transform .3s;
    }
    body.light-mode .globe-theme-knob { transform: translateX(24px); }

    /* ── Light mode overrides ── */
    body.light-mode { background: #f0f4f8; }
    body.light-mode .globe-header { background: rgba(240,244,248,.9); border-bottom-color: rgba(106,154,184,.2); }
    body.light-mode .globe-logo { color: #0f172a; -webkit-text-fill-color: #0f172a; }
    body.light-mode .globe-logo-img { filter: brightness(0); }
    body.light-mode .globe-hint { color: rgba(15,23,42,.35); }
    body.light-mode .globe-search { background: rgba(255,255,255,.9); border-color: rgba(106,154,184,.3); color: #0f172a; }
    body.light-mode .globe-search::placeholder { color: rgba(15,23,42,.35); }
    body.light-mode .globe-search-icon { color: rgba(15,23,42,.4); }
    body.light-mode .globe-search-results { background: #fff; border-color: rgba(106,154,184,.25); }
    body.light-mode .globe-sr-name { color: #0f172a; }
    body.light-mode .globe-sr-country { color: rgba(15,23,42,.4); }
    body.light-mode .globe-navbtn { border-color: rgba(82,131,160,.4); color: #5283a0; }
    body.light-mode .globe-navbtn:hover { background: rgba(106,154,184,.1); }
    body.light-mode .globe-navbtn.primary { background: #6a9ab8; border-color: #6a9ab8; color: #fff; }
    body.light-mode .city-panel { background: #f8fafc; border-left-color: rgba(106,154,184,.2); }
    body.light-mode .cp-hero::after { background: linear-gradient(to top, rgba(248,250,252,1) 0%, rgba(248,250,252,.4) 55%, transparent 100%); }
    body.light-mode .cp-city-name { color: #0f172a; text-shadow: none; }
    body.light-mode .cp-tagline { color: rgba(15,23,42,.45); }
    body.light-mode .cp-country-row { color: rgba(15,23,42,.45); }
    body.light-mode .cp-filter-bar { border-bottom-color: rgba(106,154,184,.15); }
    body.light-mode .cp-search { background: #fff; border-color: rgba(106,154,184,.3); color: #0f172a; }
    body.light-mode .cp-search::placeholder { color: rgba(15,23,42,.35); }
    body.light-mode .cp-tabs { border-bottom-color: rgba(106,154,184,.15); }
    body.light-mode .cp-tab { color: rgba(15,23,42,.35); }
    body.light-mode .cp-tab.active { color: #0f172a; }
    body.light-mode .spot-card { background: #fff; border-color: rgba(106,154,184,.15); }
    body.light-mode .spot-card:hover { background: rgba(106,154,184,.05); border-color: rgba(106,154,184,.3); }
    body.light-mode .spot-name { color: #0f172a; }
    body.light-mode .spot-tip { color: rgba(15,23,42,.4); }
    body.light-mode .cp-footer { background: rgba(248,250,252,.97); border-top-color: rgba(106,154,184,.2); }
    body.light-mode .city-count-badge { background: rgba(255,255,255,.9); border-color: rgba(106,154,184,.25); color: rgba(15,23,42,.4); }
    body.light-mode .city-count-badge span { color: #5283a0; }
    body.light-mode .globe-loading { background: #f0f4f8; }
    body.light-mode .globe-loading-logo { color: #0f172a; }
    body.light-mode .globe-loading-text { color: rgba(15,23,42,.35); }
    body.light-mode .globe-theme-btn { background: rgba(0,0,0,.05); border-color: rgba(106,154,184,.3); }
  </style>
</head>
<body>

<div class="globe-loading" id="globe-loading">
  <div class="globe-loading-logo">Travia</div>
  <div class="globe-loading-ring"></div>
  <div class="globe-loading-text">Loading Earth</div>
</div>

<div class="globe-header">
  <a href="/" class="globe-logo"><img src="travel-logo-5.png" class="globe-logo-img" alt="">Travia</a>
  <div class="globe-search-wrap" id="search-wrap">
    <input id="globe-search" class="globe-search" type="text" placeholder="Search cities…" autocomplete="off" />
    <span class="globe-search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </span>
    <div class="globe-search-results" id="search-results"></div>
  </div>
  <nav class="globe-nav">
    <button class="globe-search-toggle" id="search-toggle" onclick="toggleMobileSearch()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <a href="planner.html" class="globe-navbtn primary">Planner</a>
    <a href="/" class="globe-navbtn">Explore</a>
    <button class="globe-theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">
      <span class="globe-theme-knob">🌙</span>
    </button>
  </nav>
</div>

<div id="globe-wrap"></div>

<!-- City panel -->
<div class="city-panel" id="city-panel">
  <div class="cp-hero">
    <img id="cp-img" class="cp-hero-img" src="" alt="" />
    <div class="cp-hero-text">
      <div id="cp-country-row" class="cp-country-row">
        <span id="cp-dot" class="cp-dot"></span>
        <span id="cp-country-name"></span>
      </div>
      <div id="cp-name" class="cp-city-name"></div>
      <div id="cp-tagline" class="cp-tagline"></div>
    </div>
    <button class="cp-close" onclick="closePanel()">✕</button>
  </div>

  <div class="cp-filter-bar">
    <input id="cp-search" class="cp-search" type="text" placeholder="Search…" oninput="filterList()" autocomplete="off" />
    <div id="cp-iata" class="cp-iata">—</div>
  </div>

  <div class="cp-tabs">
    <div class="cp-tab active" data-tab="activities" onclick="switchTab('activities')">Activities</div>
    <div class="cp-tab" data-tab="food" onclick="switchTab('food')">Food</div>
    <div class="cp-tab" data-tab="transport" onclick="switchTab('transport')">Getting Around</div>
  </div>

  <div class="cp-list" id="cp-list"></div>

  <div class="cp-footer">
    <a id="cp-plan-btn" class="cp-plan-btn" href="planner.html">Plan a Trip Here →</a>
  </div>
</div>

<div class="city-count-badge">
  <span id="city-count">0</span> destinations on the globe
</div>

<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
<script src="data.js?v=6"></script>
<script>
(function () {
  const COORDS = {
    nyc:[40.7128,-74.0060], losangeles:[34.0522,-118.2437], chicago:[41.8781,-87.6298],
    miami:[25.7617,-80.1918], sanfrancisco:[37.7749,-122.4194], lasvegas:[36.1699,-115.1398],

    oslo:[59.9139,10.7522],warsaw:[52.2297,21.0122],
    mumbai:[19.0760,72.8777],delhi:[28.6139,77.2090],
    hochiminh:[10.8231,106.6297],beijing:[39.9042,116.4074],
    shanghai:[31.2304,121.4737],manila:[14.5995,120.9842],
    kathmandu:[27.7172,85.3240],auckland:[-36.8509,174.7645],
    lagos:[6.5244,3.3792],nairobi:[-1.2921,36.8219],
    telaviv:[32.0853,34.7818],doha:[25.2854,51.5310],
  };

  function pinColor(id) {
    if (['nyc','losangeles','chicago','miami','sanfrancisco','lasvegas','seattle','austin','neworleans','denver','nashville','orlando','hawaii','sandiego','washingtondc','boston','portland','atlanta','philadelphia','phoenix','dallas','houston','tampa','charlotte','memphis','minneapolis','kansascity','baltimore','pittsburgh','saltlakecity'].includes(id)) return '#f97316';
    if (['london','paris','barcelona','amsterdam','rome','lisbon','prague','budapest','istanbul','vienna','edinburgh','copenhagen','santorini','dubrovnik','venice','florence','milan','berlin','madrid','stockholm','dublin','porto','seville','athens','reykjavik','brussels','zurich','oslo','warsaw'].includes(id)) return '#a78bfa';
    if (['tokyo','kyoto','seoul','bangkok','singapore','bali','osaka','hongkong','taipei','kualalumpur','hanoi','mumbai','delhi','hochiminh','beijing','shanghai','manila','kathmandu'].includes(id)) return '#34d399';
    if (['dubai','doha'].includes(id)) return '#fbbf24';
    if (['marrakech','capetown','cairo','lagos','nairobi'].includes(id)) return '#f87171';
    if (['sydney','auckland'].includes(id)) return '#22d3ee';
    if (['buenosaires','mexicocity','toronto','vancouver','havana','riodejaneiro','saopaulo','lima','bogota','medellin','cancun','cartagena','santiago'].includes(id)) return '#fb923c';
    if (id === 'telaviv') return '#60a5fa';
    return '#fb7185';
  }

  /* build city map */
  const CITY_MAP = {};
  (typeof CITIES !== 'undefined' ? CITIES : []).forEach(c => { CITY_MAP[c.id] = c; });

  const points = Object.entries(COORDS).map(([id, [lat, lng]]) => {
    const city = CITY_MAP[id];
    if (!city) return null;
    return { id, lat, lng, color: pinColor(id), name: city.name, country: city.country, image: city.image || '' };
  }).filter(Boolean);

  /* ── State ── */
  let activeTab = 'activities';
  let currentCity = null;
  let filterQ = '';

  /* ── Panel ── */
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderList() {
    const city = currentCity;
    if (!city) return;
    const q = filterQ.toLowerCase();
    const list = document.getElementById('cp-list');

    if (activeTab === 'activities') {
      let items = (city.activities || []).filter(Boolean);
      if (q) items = items.filter(a => a.name.toLowerCase().includes(q) || (a.tip||'').toLowerCase().includes(q));
      list.innerHTML = items.length ? items.map(a => `
        <div class="spot-card">
          <img class="spot-photo" src="${esc(a.photo||city.image)}" alt="${esc(a.name)}" loading="lazy" onerror="this.src='${esc(city.image)}'" />
          <div class="spot-body">
            <div class="spot-header">
              <div class="spot-name">${esc(a.name)}</div>
              ${a.price === 0 ? '<span class="spot-price free">FREE</span>' : `<span class="spot-price">$${a.price}</span>`}
            </div>
            <div class="spot-meta">
              <span class="spot-tag tag-rating">⭐ ${a.rating}</span>
              ${a.duration ? `<span class="spot-tag tag-duration">🕐 ${esc(a.duration)}</span>` : ''}
            </div>
            <div class="spot-tip">💡 ${esc(a.tip||a.desc||'')}</div>
          </div>
        </div>`).join('') : `<div class="no-results">No activities match your search.</div>`;

    } else if (activeTab === 'food') {
      let items = (city.food || []).filter(Boolean);
      if (q) items = items.filter(f => f.name.toLowerCase().includes(q) || (f.cuisine||'').toLowerCase().includes(q) || (f.tip||'').toLowerCase().includes(q));
      list.innerHTML = items.length ? items.map(f => `
        <div class="spot-card">
          <img class="spot-photo" src="${esc(f.photo||city.image)}" alt="${esc(f.name)}" loading="lazy" onerror="this.src='${esc(city.image)}'" />
          <div class="spot-body">
            <div class="spot-header">
              <div class="spot-name">${esc(f.name)}</div>
              <span class="spot-price">$${f.price}</span>
            </div>
            <div class="spot-meta">
              <span class="spot-tag tag-rating">⭐ ${f.rating}</span>
              ${f.cuisine ? `<span class="spot-tag tag-cuisine">${esc(f.cuisine)}</span>` : ''}
            </div>
            <div class="spot-tip">💡 ${esc(f.tip||f.desc||'')}</div>
          </div>
        </div>`).join('') : `<div class="no-results">No restaurants match your search.</div>`;

    } else {
      let items = (city.transport || []).filter(Boolean);
      if (q) items = items.filter(t => t.name.toLowerCase().includes(q) || (t.type||'').toLowerCase().includes(q));
      list.innerHTML = items.length ? items.map(t => `
        <div class="spot-card">
          <div class="spot-body">
            <div class="spot-header">
              <div class="spot-name">${esc(t.name)}</div>
              <span class="spot-price">$${t.price}</span>
            </div>
            <div class="spot-meta">
              <span class="spot-tag tag-rating">⭐ ${t.rating}</span>
              ${t.type ? `<span class="spot-tag tag-type">🚌 ${esc(t.type)}</span>` : ''}
            </div>
            <div class="spot-tip">💡 ${esc(t.tip||'')}</div>
          </div>
        </div>`).join('') : `<div class="no-results">No transport options match your search.</div>`;
    }
    list.scrollTop = 0;
  }

  window.switchTab = function(tab) {
    activeTab = tab;
    filterQ = '';
    document.getElementById('cp-search').value = '';
    document.querySelectorAll('.cp-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
    renderList();
  };

  window.filterList = function() {
    filterQ = document.getElementById('cp-search').value.trim();
    renderList();
  };

  function openPanel(pt) {
    const city = CITY_MAP[pt.id];
    if (!city) return;
    currentCity = city;
    filterQ = '';
    document.getElementById('cp-search').value = '';

    document.getElementById('cp-img').src = city.image;
    document.getElementById('cp-img').alt = city.name;
    document.getElementById('cp-dot').style.background = pt.color;
    document.getElementById('cp-country-name').textContent = city.country;
    document.getElementById('cp-name').textContent = city.name;
    document.getElementById('cp-tagline').textContent = city.tagline || '';
    document.getElementById('cp-iata').textContent = city.iata || '—';
    document.getElementById('cp-plan-btn').href = `planner.html?city=${city.id}`;

    activeTab = 'activities';
    document.querySelectorAll('.cp-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === 'activities'));
    renderList();
    document.getElementById('city-panel').classList.add('open');
  }

  window.closePanel = function() {
    document.getElementById('city-panel').classList.remove('open');
    currentCity = null;
  };

  /* ── Continents ── */
  const CONTINENTS = [
    { name: 'USA & North America', region: 'usa',    lat: 39,  lng: -98,  alt: 2.3 },
    { name: 'Europe',              region: 'europe', lat: 54,  lng: 15,   alt: 2.0 },
    { name: 'Asia',                region: 'asia',   lat: 30,  lng: 105,  alt: 1.9 },
    { name: 'Latin America',       region: 'latam',  lat: -8,  lng: -58,  alt: 2.3 },
    { name: 'Middle East',         region: 'gulf',   lat: 26,  lng: 46,   alt: 2.6 },
    { name: 'Africa',              region: 'africa', lat: 2,   lng: 22,   alt: 2.2 },
    { name: 'Oceania',             region: 'oceania',lat: -24, lng: 134,  alt: 2.5 },
  ];
  function detectContinent(lat, lng) {
    if (lat > 15  && lat < 72  && lng > -168 && lng < -52)  return 'usa';
    if (lat > -56 && lat < 15  && lng > -82  && lng < -34)  return 'latam';
    if (lat > 35  && lat < 72  && lng > -25  && lng < 45)   return 'europe';
    if (lat > 12  && lat < 42  && lng > 25   && lng < 65)   return 'gulf';
    if (lat > -35 && lat < 37  && lng > -18  && lng < 52)   return 'africa';
    if (lat > -10 && lat < 78  && lng > 60   && lng < 180)  return 'asia';
    if (lat > -50 && lat < -8  && lng > 108  && lng < 180)  return 'oceania';
    return null;
  }
  function flyToContinent(c) {
    globe.controls().autoRotate = false;
    globe.pointOfView({ lat: c.lat, lng: c.lng, altitude: c.alt }, 1200);
  }

  /* ── Globe ── */
  const globe = Globe({ animateIn: true })(document.getElementById('globe-wrap'))
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .showAtmosphere(true)
    .atmosphereColor('#4a90d9')
    .atmosphereAltitude(0.2)
    .ringsData([])
    .ringLat('lat').ringLng('lng')
    .ringColor(() => '#38bdf8')
    .ringMaxRadius(2.5).ringPropagationSpeed(3).ringRepeatPeriod(900)
    .onGlobeClick(({ lat, lng }) => {
      const region = detectContinent(lat, lng);
      if (!region) return;
      const c = CONTINENTS.find(c => c.region === region);
      if (c) flyToContinent(c);
    });

  /* Ocean specularity — subtle sheen on water */
  const mat = globe.globeMaterial();
  mat.shininess = 12;
  mat.specular.setHex(0x1a3a5c);

  globe.renderer().setPixelRatio(Math.min(window.devicePixelRatio, 2));
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.35;
  globe.controls().enableDamping = true;
  globe.controls().addEventListener('start', () => { globe.controls().autoRotate = false; });
  globe.controls().addEventListener('end', () => { setTimeout(() => { globe.controls().autoRotate = true; }, 2500); });

  globe.pointOfView({ lat: 20, lng: 10, altitude: 2.2 }, 0);
  document.getElementById('city-count').textContent = points.length;
  setTimeout(() => { document.getElementById('globe-loading').style.display = 'none'; }, 1200);
  window.addEventListener('resize', () => { globe.width(window.innerWidth).height(window.innerHeight); });

  /* ── Search ── */
  const searchInput   = document.getElementById('globe-search');
  const searchResults = document.getElementById('search-results');

  function flyToCity(pt) {
    globe.controls().autoRotate = false;
    globe.pointOfView({ lat: pt.lat, lng: pt.lng, altitude: 1.4 }, 1200);
    globe.ringsData([pt]);
    setTimeout(() => { openPanel(pt); }, 1200);
    searchInput.value = '';
    searchResults.classList.remove('show');
    setTimeout(() => { globe.controls().autoRotate = true; }, 5000);
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchResults.classList.remove('show'); return; }
    const hits = points.filter(p => p.name.toLowerCase().includes(q) || p.country.toLowerCase().includes(q)).slice(0, 8);
    if (!hits.length) { searchResults.classList.remove('show'); return; }
    searchResults.innerHTML = hits.map(p =>
      `<div class="globe-search-result" data-id="${p.id}">
         <span style="width:7px;height:7px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>
         <span class="globe-sr-name">${p.name}</span>
         <span class="globe-sr-country">${p.country}</span>
       </div>`).join('');
    searchResults.classList.add('show');
    searchResults.querySelectorAll('.globe-search-result').forEach(el => {
      el.addEventListener('click', () => {
        const pt = points.find(p => p.id === el.dataset.id);
        if (pt) flyToCity(pt);
      });
    });
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = searchInput.value.trim().toLowerCase();
      const m = points.find(p => p.name.toLowerCase().startsWith(q));
      if (m) flyToCity(m);
    }
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchResults.classList.remove('show');
      closeMobileSearch();
    }
  });

  document.addEventListener('click', e => {
    const wrap = document.getElementById('search-wrap');
    const toggle = document.getElementById('search-toggle');
    if (!wrap.contains(e.target) && !toggle?.contains(e.target)) {
      searchResults.classList.remove('show');
      closeMobileSearch();
    }
  });

  window.toggleMobileSearch = function() {
    const header = document.querySelector('.globe-header');
    const toggle = document.getElementById('search-toggle');
    const isOpen = header.classList.toggle('search-open');
    toggle.classList.toggle('active', isOpen);
    if (isOpen) setTimeout(() => searchInput.focus(), 220);
    else { searchInput.value = ''; searchResults.classList.remove('show'); }
  };

  function closeMobileSearch() {
    const header = document.querySelector('.globe-header');
    const toggle = document.getElementById('search-toggle');
    header.classList.remove('search-open');
    toggle?.classList.remove('active');
  }
})();
</script>
<script src="theme.js"></script>
