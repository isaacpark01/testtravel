<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropped — World Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07111a; font-family: 'Geist', 'Inter', system-ui, sans-serif; }

    /* ── Canvas container ── */
    #globe-wrap { width: 100%; height: 100%; }

    /* ── Top bar ── */
    .globe-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(7,17,26,.96) 0%, transparent 100%);
      pointer-events: none;
    }
    .globe-logo {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 18px; font-weight: 800; letter-spacing: -.4px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; pointer-events: auto; cursor: pointer;
      text-decoration: none;
    }
    .globe-hint {
      font-size: 12px; color: rgba(255,255,255,.28);
      pointer-events: none; display: none;
    }
    @media (min-width: 640px) { .globe-hint { display: block; } }

    /* ── Search bar ── */
    .globe-search-wrap {
      flex: 1; max-width: 320px; position: relative; pointer-events: auto;
    }
    .globe-search {
      width: 100%; padding: 8px 36px 8px 14px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.15);
      border-radius: 24px; color: #fff; font-size: 13px;
      font-family: 'Geist', 'Inter', sans-serif;
      outline: none; transition: border-color .2s, background .2s;
    }
    .globe-search::placeholder { color: rgba(255,255,255,.35); }
    .globe-search:focus {
      border-color: rgba(56,189,248,.5);
      background: rgba(255,255,255,.1);
    }
    .globe-search-icon {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none; opacity: .5;
    }
    .globe-search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: rgba(7,17,26,.96); border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; overflow: hidden; display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .globe-search-results.show { display: block; }
    .globe-search-result {
      padding: 10px 16px; font-size: 13px; color: rgba(255,255,255,.85);
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: background .15s;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .globe-search-result:last-child { border-bottom: none; }
    .globe-search-result:hover { background: rgba(56,189,248,.12); }
    .globe-search-result-city { font-weight: 700; }
    .globe-search-result-country { font-size: 11px; color: rgba(255,255,255,.4); margin-left: auto; }

    .globe-nav-links {
      margin-left: auto; pointer-events: auto;
      display: flex; align-items: center; gap: 8px;
    }
    .globe-back {
      background: rgba(56,189,248,.1); border: 1px solid rgba(56,189,248,.28);
      color: #38bdf8; padding: 7px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
      transition: background .2s;
    }
    .globe-back:hover { background: rgba(56,189,248,.22); }

    /* ── City info panel ── */
    .city-panel {
      position: fixed; right: 0; top: 0; bottom: 0; z-index: 200;
      width: 320px;
      background: rgba(7,17,26,.93);
      backdrop-filter: blur(24px);
      border-left: 1px solid rgba(56,189,248,.15);
      padding: 80px 24px 24px;
      display: flex; flex-direction: column; gap: 0;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.22,.8,.25,1);
      overflow-y: auto;
    }
    .city-panel.open { transform: translateX(0); }
    .city-panel-close {
      position: absolute; top: 18px; right: 18px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.6); width: 32px; height: 32px; border-radius: 50%;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .city-panel-close:hover { background: rgba(220,38,38,.4); color: #fff; }

    .city-panel-img {
      width: 100%; height: 160px; border-radius: 14px; object-fit: cover;
      background: #0a1a20; margin-bottom: 18px; display: block;
    }
    .city-panel-country {
      font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: #38bdf8; margin-bottom: 6px;
    }
    .city-panel-name {
      font-size: 26px; font-weight: 800; color: #fff;
      letter-spacing: -.03em; line-height: 1.1; margin-bottom: 8px;
    }
    .city-panel-tagline {
      font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.6; margin-bottom: 20px;
    }
    .city-panel-stats {
      display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .city-stat {
      background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.18);
      border-radius: 8px; padding: 8px 14px; text-align: center; flex: 1; min-width: 70px;
    }
    .city-stat-num { font-size: 18px; font-weight: 800; color: #38bdf8; display: block; }
    .city-stat-label { font-size: 10px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .08em; }
    .city-panel-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1); border: none; color: #fff;
      padding: 14px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
      transition: opacity .2s, transform .15s;
    }
    .city-panel-btn:hover { opacity: .88; transform: translateY(-1px); }

    /* ── Country tooltip ── */
    .country-tooltip {
      position: fixed; z-index: 300; pointer-events: none;
      background: rgba(7,17,26,.9); backdrop-filter: blur(12px);
      border: 1px solid rgba(56,189,248,.25); border-radius: 10px;
      padding: 8px 14px; font-size: 13px; font-weight: 600; color: #fff;
      opacity: 0; transition: opacity .15s;
      white-space: nowrap;
    }
    .country-tooltip.show { opacity: 1; }

    /* ── Loading ── */
    .globe-loading {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #07111a; gap: 16px;
    }
    .globe-loading-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(56,189,248,.15);
      border-top-color: #38bdf8;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .globe-loading-text { font-size: 13px; color: rgba(255,255,255,.4); }

    /* ── City count badge ── */
    .city-count-badge {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(7,17,26,.8); backdrop-filter: blur(12px);
      border: 1px solid rgba(56,189,248,.2); border-radius: 30px;
      padding: 8px 20px; font-size: 13px; color: rgba(255,255,255,.5);
      pointer-events: none; z-index: 100;
    }
    .city-count-badge span { color: #38bdf8; font-weight: 700; }

    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Black.woff2') format('woff2');
      font-weight: 800; font-display: swap;
    }
  </style>
</head>
<body>

<div class="globe-loading" id="globe-loading">
  <div class="globe-loading-ring"></div>
  <div class="globe-loading-text">Loading Earth…</div>
</div>

<!-- Header -->
<div class="globe-header">
  <a href="/" class="globe-logo">🌍 Dropped</a>
  <span class="globe-hint">Click a pin · Drag to rotate · Scroll to zoom</span>
  <!-- Search -->
  <div class="globe-search-wrap" id="search-wrap">
    <input id="globe-search" class="globe-search" type="text" placeholder="Search cities…" autocomplete="off" />
    <span class="globe-search-icon">🔍</span>
    <div class="globe-search-results" id="search-results"></div>
  </div>
  <div class="globe-nav-links">
    <a href="planner.html" class="globe-back">🗓 Planner</a>
    <a href="/" class="globe-back">← Explore</a>
  </div>
</div>

<!-- Globe canvas -->
<div id="globe-wrap"></div>

<!-- City info panel -->
<div class="city-panel" id="city-panel">
  <button class="city-panel-close" onclick="closePanel()">✕</button>
  <img id="cp-img" class="city-panel-img" src="" alt="" />
  <div id="cp-country" class="city-panel-country"></div>
  <div id="cp-name"    class="city-panel-name"></div>
  <div id="cp-tagline" class="city-panel-tagline"></div>
  <div class="city-panel-stats">
    <div class="city-stat">
      <span id="cp-activities" class="city-stat-num">—</span>
      <span class="city-stat-label">Activities</span>
    </div>
    <div class="city-stat">
      <span id="cp-food" class="city-stat-num">—</span>
      <span class="city-stat-label">Restaurants</span>
    </div>
    <div class="city-stat">
      <span id="cp-iata" class="city-stat-num">—</span>
      <span class="city-stat-label">Airport</span>
    </div>
  </div>
  <a id="cp-link" class="city-panel-btn" href="/">
    🗺 Explore this City
  </a>
</div>

<!-- Country tooltip -->
<div class="country-tooltip" id="country-tooltip"></div>

<!-- City count -->
<div class="city-count-badge">
  <span id="city-count">0</span> destinations on the globe
</div>

<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
<script src="data.js?v=4"></script>
<script>
(function () {
  /* ── City coordinates — all keys match data.js city IDs ── */
  const COORDS = {
    // USA (original)
    nyc:          [40.7128,  -74.0060],
    losangeles:   [34.0522, -118.2437],
    chicago:      [41.8781,  -87.6298],
    miami:        [25.7617,  -80.1918],
    sanfrancisco: [37.7749, -122.4194],
    lasvegas:     [36.1699, -115.1398],
    seattle:      [47.6062, -122.3321],
    austin:       [30.2672,  -97.7431],
    neworleans:   [29.9511,  -90.0715],
    denver:       [39.7392, -104.9903],
    nashville:    [36.1627,  -86.7816],
    orlando:      [28.5383,  -81.3792],
    hawaii:       [20.7967, -156.3319],
    sandiego:     [32.7157, -117.1611],
    washingtondc: [38.9072,  -77.0369],
    boston:       [42.3601,  -71.0589],
    portland:     [45.5051, -122.6750],
    atlanta:      [33.7490,  -84.3880],
    philadelphia: [39.9526,  -75.1652],
    phoenix:      [33.4484, -112.0740],
    // Europe (original)
    london:       [51.5074,   -0.1278],
    paris:        [48.8566,    2.3522],
    barcelona:    [41.3851,    2.1734],
    amsterdam:    [52.3676,    4.9041],
    rome:         [41.9028,   12.4964],
    lisbon:       [38.7169,   -9.1399],
    prague:       [50.0755,   14.4378],
    budapest:     [47.4979,   19.0402],
    istanbul:     [41.0082,   28.9784],
    vienna:       [48.2082,   16.3738],
    edinburgh:    [55.9533,   -3.1883],
    copenhagen:   [55.6761,   12.5683],
    // Asia & Pacific (original)
    tokyo:        [35.6762,  139.6503],
    kyoto:        [35.0116,  135.7681],
    seoul:        [37.5665,  126.9780],
    bangkok:      [13.7563,  100.5018],
    singapore:    [ 1.3521,  103.8198],
    bali:         [-8.4095,  115.1889],
    sydney:       [-33.8688, 151.2093],
    // Middle East & Africa (original)
    dubai:        [25.2048,   55.2708],
    marrakech:    [31.6295,   -7.9811],
    capetown:     [-33.9249,  18.4241],
    // Americas (original)
    mexicocity:   [19.4326,  -99.1332],
    havana:       [23.1136,  -82.3666],
    // Batch 3 — Europe & Asia
    santorini:    [36.3932,   25.4615],
    dubrovnik:    [42.6507,   18.0944],
    venice:       [45.4408,   12.3155],
    florence:     [43.7696,   11.2558],
    milan:        [45.4654,    9.1859],
    berlin:       [52.5200,   13.4050],
    madrid:       [40.4168,   -3.7038],
    cairo:        [30.0444,   31.2357],
    osaka:        [34.6937,  135.5023],
    hongkong:     [22.3193,  114.1694],
    // Batch 4 — Asia & Americas
    taipei:       [25.0330,  121.5654],
    kualalumpur:  [ 3.1390,  101.6869],
    hanoi:        [21.0278,  105.8342],
    buenosaires:  [-34.6037, -58.3816],
    toronto:      [43.6532,  -79.3832],
    vancouver:    [49.2827, -123.1207],
    stockholm:    [59.3293,   18.0686],
    dublin:       [53.3498,   -6.2603],
    // Batch 5 — More USA
    dallas:       [32.7767,  -96.7970],
    houston:      [29.7604,  -95.3698],
    tampa:        [27.9506,  -82.4572],
    charlotte:    [35.2271,  -80.8431],
    memphis:      [35.1495,  -90.0490],
    minneapolis:  [44.9778,  -93.2650],
    kansascity:   [39.0997,  -94.5786],
    baltimore:    [39.2904,  -76.6122],
    pittsburgh:   [40.4406,  -79.9959],
    saltlakecity: [40.7608, -111.8910],
  };

  /* ── Pin color by region ── */
  const REGION_COLOR = {
    usa:    '#f97316', // orange
    europe: '#a78bfa', // violet
    asia:   '#34d399', // emerald
    mideast:'#fbbf24', // amber
    africa: '#f87171', // red
    americas:'#fb7185', // rose
    pacific:'#22d3ee', // cyan
  };
  function getRegionColor(id) {
    const usa = ['nyc','losangeles','chicago','miami','sanfrancisco','lasvegas','seattle','austin','neworleans','denver','nashville','orlando','hawaii','sandiego','washingtondc','boston','portland','atlanta','philadelphia','phoenix','dallas','houston','tampa','charlotte','memphis','minneapolis','kansascity','baltimore','pittsburgh','saltlakecity'];
    const europe = ['london','paris','barcelona','amsterdam','rome','lisbon','prague','budapest','istanbul','vienna','edinburgh','copenhagen','santorini','dubrovnik','venice','florence','milan','berlin','madrid','stockholm','dublin'];
    const asia = ['tokyo','kyoto','seoul','bangkok','singapore','bali','osaka','hongkong','taipei','kualalumpur','hanoi'];
    const mideast = ['dubai'];
    const africa = ['marrakech','capetown','cairo'];
    const pacific = ['sydney'];
    if (usa.includes(id))     return REGION_COLOR.usa;
    if (europe.includes(id))  return REGION_COLOR.europe;
    if (asia.includes(id))    return REGION_COLOR.asia;
    if (mideast.includes(id)) return REGION_COLOR.mideast;
    if (africa.includes(id))  return REGION_COLOR.africa;
    if (pacific.includes(id)) return REGION_COLOR.pacific;
    return REGION_COLOR.americas;
  }

  /* ── Build points from CITIES data ── */
  const points = (typeof CITIES !== 'undefined' ? CITIES : []).map(city => {
    const coord = COORDS[city.id];
    if (!coord) return null;
    return {
      id:         city.id,
      name:       city.name,
      country:    city.country,
      tagline:    city.tagline || '',
      image:      city.image  || '',
      iata:       city.iata   || '—',
      activities: (city.activities || []).length,
      food:       (city.food || []).length,
      lat:        coord[0],
      lng:        coord[1],
      color:      getRegionColor(city.id),
    };
  }).filter(Boolean);

  /* ── DOM refs ── */
  const tooltip = document.getElementById('country-tooltip');
  const panel   = document.getElementById('city-panel');
  const loading = document.getElementById('globe-loading');

  function openPanel(city) {
    document.getElementById('cp-img').src                 = city.image;
    document.getElementById('cp-img').alt                 = city.name;
    document.getElementById('cp-country').textContent     = city.country;
    document.getElementById('cp-name').textContent        = city.name;
    document.getElementById('cp-tagline').textContent     = city.tagline || '';
    document.getElementById('cp-activities').textContent  = city.activities;
    document.getElementById('cp-food').textContent        = city.food;
    document.getElementById('cp-iata').textContent        = city.iata;
    document.getElementById('cp-link').href = '/?city=' + city.id + '#cities';
    panel.classList.add('open');
  }
  window.closePanel = function() { panel.classList.remove('open'); };

  /* ── Globe init ── */
  const globe = Globe({ animateIn: true })
    (document.getElementById('globe-wrap'))

    /* Earth textures — vibrant day texture */
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-day.jpg')
    .bumpImageUrl ('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')

    /* Atmosphere */
    .showAtmosphere(true)
    .atmosphereColor('#60a5fa')
    .atmosphereAltitude(0.16)

    /* City pins — colored by region */
    .pointsData(points)
    .pointLat('lat')
    .pointLng('lng')
    .pointLabel(d => `<div style="background:rgba(7,17,26,.92);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;color:#fff;font-family:Geist,Inter,sans-serif">${d.name}<br><span style="font-size:11px;color:${d.color};font-weight:500">${d.country}</span></div>`)
    .pointColor(d => d.color)
    .pointAltitude(0.016)
    .pointRadius(0.5)
    .pointResolution(12)
    .onPointHover(d => {
      document.getElementById('globe-wrap').style.cursor = d ? 'pointer' : 'default';
    })

    /* Pulse rings */
    .ringsData([])
    .ringColor(d => d.color || '#38bdf8')
    .ringMaxRadius(3)
    .ringPropagationSpeed(2)
    .ringRepeatPeriod(700);

  /* ── Click: open panel + pulse + stop rotate ── */
  globe.onPointClick(d => {
    globe.controls().autoRotate = false;
    globe.ringsData([{ lat: d.lat, lng: d.lng, maxR: 4, propagationSpeed: 2, repeatPeriod: 800, color: d.color }]);
    setTimeout(() => globe.ringsData([]), 3000);
    openPanel(d);
  });

  /* ── Auto-rotate ── */
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.35;
  globe.controls().enableDamping = true;

  globe.controls().addEventListener('start', () => { globe.controls().autoRotate = false; });
  globe.controls().addEventListener('end',   () => {
    setTimeout(() => { globe.controls().autoRotate = true; }, 2500);
  });

  /* ── Initial camera ── */
  globe.pointOfView({ lat: 20, lng: 10, altitude: 2.2 }, 0);

  /* ── City count badge ── */
  document.getElementById('city-count').textContent = points.length;

  /* ── Hide loading when ready ── */
  setTimeout(() => { loading.style.display = 'none'; }, 1200);

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    globe.width(window.innerWidth).height(window.innerHeight);
  });

  /* ── Search ── */
  const searchInput   = document.getElementById('globe-search');
  const searchResults = document.getElementById('search-results');

  function flyToCity(pt) {
    globe.controls().autoRotate = false;
    globe.pointOfView({ lat: pt.lat, lng: pt.lng, altitude: 1.4 }, 1200);
    setTimeout(() => {
      globe.ringsData([{ lat: pt.lat, lng: pt.lng, maxR: 4, propagationSpeed: 2, repeatPeriod: 800, color: pt.color }]);
      setTimeout(() => globe.ringsData([]), 3000);
      openPanel(pt);
    }, 1200);
    searchInput.value = '';
    searchResults.classList.remove('show');
    setTimeout(() => { globe.controls().autoRotate = true; }, 5000);
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchResults.classList.remove('show'); return; }
    const matches = points.filter(p =>
      p.name.toLowerCase().includes(q) || p.country.toLowerCase().includes(q)
    ).slice(0, 8);
    if (!matches.length) { searchResults.classList.remove('show'); return; }
    searchResults.innerHTML = matches.map(p =>
      `<div class="globe-search-result" data-id="${p.id}">
         <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block"></span>
         <span class="globe-search-result-city">${p.name}</span>
         <span class="globe-search-result-country">${p.country}</span>
       </div>`
    ).join('');
    searchResults.classList.add('show');
    searchResults.querySelectorAll('.globe-search-result').forEach(el => {
      el.addEventListener('click', () => {
        const pt = points.find(p => p.id === el.dataset.id);
        if (pt) flyToCity(pt);
      });
    });
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = searchInput.value.trim().toLowerCase();
      const match = points.find(p => p.name.toLowerCase() === q || p.name.toLowerCase().startsWith(q));
      if (match) flyToCity(match);
    }
    if (e.key === 'Escape') {
      searchInput.value = '';
      searchResults.classList.remove('show');
    }
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) {
      searchResults.classList.remove('show');
    }
  });
})();
</script>
</body>
</html>
