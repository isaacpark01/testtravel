<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropped — World Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #07111a; font-family: 'Geist', 'Inter', system-ui, sans-serif; }
    #globe-wrap { width: 100%; height: 100%; }

    /* ── Header ── */
    .globe-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; gap: 14px; padding: 13px 20px;
      background: linear-gradient(to bottom, rgba(7,17,26,.97) 0%, transparent 100%);
      pointer-events: none;
    }
    .globe-logo {
      font-size: 17px; font-weight: 800; letter-spacing: -.4px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; pointer-events: auto; text-decoration: none;
    }
    .globe-hint { font-size: 12px; color: rgba(255,255,255,.25); display: none; }
    @media (min-width: 700px) { .globe-hint { display: block; } }

    /* ── Search ── */
    .globe-search-wrap { flex: 1; max-width: 300px; position: relative; pointer-events: auto; }
    .globe-search {
      width: 100%; padding: 7px 34px 7px 13px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.13);
      border-radius: 22px; color: #fff; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .18s, background .18s;
    }
    .globe-search::placeholder { color: rgba(255,255,255,.32); }
    .globe-search:focus { border-color: rgba(56,189,248,.45); background: rgba(255,255,255,.1); }
    .globe-search-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; opacity: .45; }
    .globe-search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: rgba(8,18,28,.97); border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px; overflow: hidden; display: none;
      box-shadow: 0 10px 40px rgba(0,0,0,.6);
    }
    .globe-search-results.show { display: block; }
    .globe-search-result {
      padding: 9px 14px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 9px;
      border-bottom: 1px solid rgba(255,255,255,.05); transition: background .12s;
    }
    .globe-search-result:last-child { border-bottom: none; }
    .globe-search-result:hover { background: rgba(56,189,248,.1); }
    .globe-sr-name { font-weight: 700; color: #fff; }
    .globe-sr-country { font-size: 11px; color: rgba(255,255,255,.38); margin-left: auto; }
    .globe-nav { margin-left: auto; pointer-events: auto; display: flex; gap: 8px; align-items: center; }
    .globe-navbtn {
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.7); padding: 6px 14px; border-radius: 18px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none;
      transition: background .18s, color .18s; font-family: inherit;
    }
    .globe-navbtn:hover { background: rgba(56,189,248,.15); color: #38bdf8; border-color: rgba(56,189,248,.3); }

    /* ── Region Filter Bar ── */
    .region-filters {
      position: fixed; top: 58px; left: 50%; transform: translateX(-50%);
      z-index: 99; display: flex; gap: 5px; align-items: center;
      padding: 5px 10px;
      background: rgba(7,17,26,.82); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 30px;
      max-width: calc(100vw - 32px); overflow-x: auto;
      scrollbar-width: none; pointer-events: auto;
    }
    .region-filters::-webkit-scrollbar { display: none; }
    .region-btn {
      background: transparent; border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.45); padding: 4px 11px; border-radius: 20px;
      font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: all .15s; font-family: inherit; flex-shrink: 0;
    }
    .region-btn:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.8); border-color: rgba(255,255,255,.2); }
    .region-btn.active { background: rgba(56,189,248,.14); color: #38bdf8; border-color: rgba(56,189,248,.32); }

    /* globe.gl built-in tooltip */
    .scene-tooltip { font-family: 'Geist','Inter',system-ui,sans-serif !important; font-size: 12px !important; font-weight: 700 !important; background: rgba(8,18,28,.93) !important; border: 1px solid rgba(255,255,255,.12) !important; border-radius: 10px !important; padding: 6px 11px !important; color: #fff !important; }

    /* ── City Panel ── */
    .city-panel {
      position: fixed; right: 0; top: 0; bottom: 0; z-index: 200;
      width: min(440px, 100vw);
      background: #0d1220;
      border-left: 1px solid rgba(255,255,255,.07);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .36s cubic-bezier(.22,.8,.25,1);
      overflow: hidden;
    }
    .city-panel.open { transform: translateX(0); }

    /* hero */
    .cp-hero {
      position: relative; flex-shrink: 0; height: 200px; overflow: hidden; background: #0d1220;
    }
    .cp-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: .7; }
    .cp-hero::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,18,32,1) 0%, rgba(0,0,0,.1) 60%);
    }
    .cp-hero-text { position: absolute; bottom: 14px; left: 16px; z-index: 10; }
    .cp-country-row {
      font-size: 10px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase;
      color: rgba(255,255,255,.5); margin-bottom: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .cp-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cp-city-name { font-size: clamp(20px,5vw,28px); font-weight: 800; color: #fff; line-height: 1.1; }
    .cp-tagline { color: rgba(255,255,255,.45); font-size: 12px; margin-top: 3px; }
    .cp-close {
      position: absolute; top: 12px; right: 12px; z-index: 20;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.75); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .cp-close:hover { background: rgba(220,38,38,.6); color: #fff; }

    /* Wishlist / Visited hero buttons */
    .cp-hero-actions {
      position: absolute; top: 12px; left: 12px; z-index: 20;
      display: flex; gap: 6px;
    }
    .cp-save-btn {
      background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.7); padding: 5px 10px; border-radius: 16px;
      font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background .15s, color .15s, border-color .15s;
    }
    #cp-wishlist-btn.active { background: rgba(251,113,133,.22); color: #fb7185; border-color: rgba(251,113,133,.4); }
    #cp-visited-btn.active  { background: rgba(52,211,153,.22);  color: #34d399; border-color: rgba(52,211,153,.4); }

    /* filter bar */
    .cp-filter-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0;
    }
    .cp-search {
      flex: 1; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; color: #f0eae4; font-size: 13px; padding: 7px 12px;
      outline: none; font-family: inherit;
    }
    .cp-search::placeholder { color: rgba(240,250,249,.3); }
    .cp-search:focus { border-color: rgba(151,172,224,.4); }
    .cp-iata {
      font-size: 12px; font-weight: 700; color: #97ace0;
      background: rgba(151,172,224,.1); border: 1px solid rgba(151,172,224,.2);
      border-radius: 8px; padding: 6px 10px; white-space: nowrap; flex-shrink: 0;
    }

    /* tabs */
    .cp-tabs {
      display: flex; flex-shrink: 0; overflow-x: auto;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .cp-tabs::-webkit-scrollbar { display: none; }
    .cp-tab {
      flex: 1; padding: 10px 6px; text-align: center; white-space: nowrap;
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,.38);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s; user-select: none; min-width: 80px;
    }
    .cp-tab.active { color: #f0eae4; border-bottom-color: #97ace0; }

    /* list — extra bottom padding for taller footer */
    .cp-list { flex: 1; overflow-y: auto; padding: 10px 12px 155px; }
    .cp-list::-webkit-scrollbar { width: 4px; }
    .cp-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

    /* spot cards */
    .spot-card {
      background: rgba(13,18,32,.8); border: 1px solid rgba(106,154,184,.12);
      border-radius: 14px; overflow: hidden; margin-bottom: 12px; transition: all .2s;
    }
    .spot-card:hover { background: rgba(106,154,184,.08); border-color: rgba(106,154,184,.25); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
    .spot-photo { width: 100%; height: 160px; object-fit: cover; display: block; background: #0d1220; }
    .spot-body { padding: 12px 14px 10px; }
    .spot-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .spot-name { font-size: 14px; font-weight: 700; color: #f0eae4; line-height: 1.3; }
    .spot-price { font-size: 13px; font-weight: 700; white-space: nowrap; color: #97ace0; flex-shrink: 0; }
    .spot-price.free { color: #34d399; }
    .spot-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .spot-tag { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
    .tag-rating   { background: rgba(251,191,36,.12); color: #fbbf24; }
    .tag-duration { background: rgba(151,172,224,.1);  color: #97ace0; }
    .tag-type     { background: rgba(52,211,153,.1);   color: #34d399; }
    .tag-cuisine  { background: rgba(52,211,153,.1);   color: #34d399; }
    .spot-tip {
      font-size: 11px; color: rgba(240,250,249,.38); line-height: 1.6;
      border-left: 2px solid rgba(151,172,224,.2); padding-left: 9px; margin-bottom: 10px;
    }
    .spot-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .spot-link {
      font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 12px;
      text-decoration: none; transition: opacity .15s, transform .1s;
      display: flex; align-items: center; gap: 4px;
    }
    .spot-link:hover { opacity: .78; transform: translateY(-1px); }
    .spot-link.yelp  { background: rgba(196,69,54,.15); color: #ef4444; border: 1px solid rgba(196,69,54,.25); }
    .spot-link.maps  { background: rgba(56,189,248,.12); color: #38bdf8; border: 1px solid rgba(56,189,248,.22); }
    .spot-link.tiktok{ background: rgba(129,140,248,.12); color: #818cf8; border: 1px solid rgba(129,140,248,.22); }
    .spot-link.ig    { background: rgba(244,63,94,.12);  color: #fb7185; border: 1px solid rgba(244,63,94,.22); }

    .no-results { text-align: center; padding: 40px 20px; color: rgba(255,255,255,.3); font-size: 14px; }

    /* footer */
    .cp-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 14px 12px;
      background: rgba(13,18,32,.97);
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .cp-plan-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border: none; color: #fff; padding: 13px; border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
      transition: opacity .2s, transform .15s;
    }
    .cp-plan-btn:hover { opacity: .88; transform: translateY(-1px); }

    /* ── Nearby Cities ── */
    .cp-nearby { margin-bottom: 10px; }
    .cp-nearby-title {
      font-size: 9px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
      color: rgba(255,255,255,.28); margin-bottom: 7px;
    }
    .cp-nearby-row { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
    .cp-nearby-row::-webkit-scrollbar { display: none; }
    .cp-nearby-chip {
      flex-shrink: 0; display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px; padding: 5px 10px; cursor: pointer;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,.65);
      transition: background .15s, color .15s, border-color .15s;
    }
    .cp-nearby-chip:hover { background: rgba(56,189,248,.12); color: #38bdf8; border-color: rgba(56,189,248,.25); }
    .cp-nearby-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }


    /* ── Loading ── */
    .globe-loading {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #07111a; gap: 16px;
    }
    .globe-loading-ring {
      width: 46px; height: 46px; border-radius: 50%;
      border: 3px solid rgba(56,189,248,.12); border-top-color: #38bdf8;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .globe-loading-text { font-size: 13px; color: rgba(255,255,255,.38); }


    /* ── Pause/Play ── */
    .globe-pause-btn {
      position: fixed; bottom: 70px; right: 20px; z-index: 100;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(7,17,26,.85); border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.75); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(12px);
      transition: background .15s, color .15s, transform .15s, border-color .15s;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    .globe-pause-btn:hover { background: rgba(56,189,248,.2); color: #38bdf8; border-color: rgba(56,189,248,.35); transform: scale(1.1); }
    .globe-pause-btn.paused { background: rgba(56,189,248,.15); color: #38bdf8; border-color: rgba(56,189,248,.35); }


    /* ── City Count Badge ── */
    .city-count-badge {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      background: rgba(7,17,26,.82); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.1); border-radius: 28px;
      padding: 7px 18px; font-size: 12px; color: rgba(255,255,255,.45);
      pointer-events: none; z-index: 100; white-space: nowrap;
    }
    .city-count-badge span { color: #38bdf8; font-weight: 700; }

    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Black.woff2') format('woff2');
      font-weight: 800; font-display: swap;
    }
  </style>
</head>
<body>

<div class="globe-loading" id="globe-loading">
  <div class="globe-loading-ring"></div>
  <div class="globe-loading-text">Loading Earth…</div>
</div>

<div class="globe-header">
  <a href="/" class="globe-logo">🌍 Dropped</a>
  <span class="globe-hint">Search a city or continent above · Drag to rotate · Scroll to zoom</span>
  <div class="globe-search-wrap" id="search-wrap">
    <input id="globe-search" class="globe-search" type="text" placeholder="Search cities…" autocomplete="off" />
    <span class="globe-search-icon">🔍</span>
    <div class="globe-search-results" id="search-results"></div>
  </div>
  <nav class="globe-nav">
    <a href="planner.html" class="globe-navbtn">🗓 Planner</a>
    <a href="/" class="globe-navbtn">← Explore</a>
  </nav>
</div>

<!-- Region filter bar -->
<div class="region-filters">
  <button class="region-btn active" data-region="">🌍 All</button>
  <button class="region-btn" data-region="usa">🇺🇸 USA</button>
  <button class="region-btn" data-region="europe">🏰 Europe</button>
  <button class="region-btn" data-region="asia">🌏 Asia</button>
  <button class="region-btn" data-region="latam">🌎 LatAm</button>
  <button class="region-btn" data-region="gulf">🕌 Gulf / ME</button>
  <button class="region-btn" data-region="africa">🌍 Africa</button>
  <button class="region-btn" data-region="oceania">🦘 Oceania</button>
</div>

<div id="globe-wrap"></div>

<!-- City panel -->
<div class="city-panel" id="city-panel">
  <div class="cp-hero">
    <img id="cp-img" class="cp-hero-img" src="" alt=""
      onerror="this.style.opacity='.15'; this.src='https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=800&auto=format&fit=crop'" />
    <div class="cp-hero-text">
      <div class="cp-country-row">
        <span id="cp-dot" class="cp-dot"></span>
        <span id="cp-country-name"></span>
      </div>
      <div id="cp-name" class="cp-city-name"></div>
      <div id="cp-tagline" class="cp-tagline"></div>
    </div>
    <button class="cp-close" onclick="closePanel()">✕</button>
    <div class="cp-hero-actions">
      <button class="cp-save-btn" id="cp-wishlist-btn" onclick="toggleWishlist()">♡ Wishlist</button>
      <button class="cp-save-btn" id="cp-visited-btn" onclick="toggleVisited()">○ Visited</button>
    </div>
  </div>

  <div class="cp-filter-bar">
    <input id="cp-search" class="cp-search" type="text" placeholder="🔍 Search activities, food…" oninput="filterList()" autocomplete="off" />
    <div id="cp-iata" class="cp-iata">—</div>
  </div>

  <div class="cp-tabs">
    <div class="cp-tab active" data-tab="activities" onclick="switchTab('activities')">🎯 Activities</div>
    <div class="cp-tab" data-tab="food" onclick="switchTab('food')">🍽 Food</div>
    <div class="cp-tab" data-tab="transport" onclick="switchTab('transport')">🚇 Getting Around</div>
  </div>

  <div class="cp-list" id="cp-list"></div>

  <div class="cp-footer">
    <div class="cp-nearby">
      <div class="cp-nearby-title">Nearby Destinations</div>
      <div class="cp-nearby-row" id="cp-nearby-row"></div>
    </div>
    <a id="cp-plan-btn" class="cp-plan-btn" href="planner.html">🗓 Plan a Trip Here</a>
  </div>
</div>

<button class="globe-pause-btn" id="pause-btn" title="Pause rotation">⏸</button>

<div class="city-count-badge">
  <span id="city-count">0</span> destinations on the globe
</div>

<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>

  /* ── Region classifier ── */
  function getRegion(id) {

    if (['london','paris','barcelona','amsterdam','rome','lisbon','prague','budapest','istanbul','vienna','edinburgh','copenhagen','santorini','dubrovnik','venice','florence','milan','berlin','madrid','stockholm','dublin','porto','seville','athens','reykjavik','brussels','zurich','oslo','warsaw'].includes(id)) return '#a78bfa';
    if (['tokyo','kyoto','seoul','bangkok','singapore','bali','osaka','hongkong','taipei','kualalumpur','hanoi','mumbai','delhi','hochiminh','beijing','shanghai','manila','kathmandu'].includes(id)) return '#34d399';

  function saveSet(key, set) {

  /* ── Nearby cities (haversine) ── */
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371, r = x => x * Math.PI / 180;
    const dLat = r(lat2 - lat1), dLng = r(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1)) * Math.cos(r(lat2)) * Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function renderNearby() {
    const row = document.getElementById('cp-nearby-row');
    if (!currentCity || !COORDS[currentCity.id]) { row.innerHTML = ''; return; }
    const [lat, lng] = COORDS[currentCity.id];
    const nearby = points
      .filter(p => p.id !== currentCity.id)
      .map(p => ({ ...p, dist: haversine(lat, lng, p.lat, p.lng) }))
      .sort((a, b) => a.dist - b.dist)
      .slice(0, 4);
    row.innerHTML = nearby.map(p =>
      `<div class="cp-nearby-chip" onclick="flyToFromPanel('${p.id}')">
         <div class="cp-nearby-dot" style="background:${p.color}"></div>
         ${esc(p.name)}
       </div>`
    ).join('');
  }

  window.flyToFromPanel = function(id) {
    const pt = points.find(p => p.id === id);
    if (!pt || !globe) return;
    closePanel();
    globe.controls().autoRotate = false;
    globe.pointOfView({ lat: pt.lat, lng: pt.lng, altitude: 1.5 }, 1200);
    setTimeout(() => openPanel(pt), 1300);
    if (isRotating) setTimeout(() => { if (globe) globe.controls().autoRotate = true; }, 7000);

  /* ── Escape helpers ── */
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ── Continents ── */
  const CONTINENTS = [
    { name:'USA & North America', emoji:'🇺🇸', region:'usa',     lat:39,  lng:-98,  altitude:2.3 },
    { name:'Europe',              emoji:'🏰', region:'europe',  lat:54,  lng:15,   altitude:2.0 },

  function detectContinent(lat, lng) {
    if (lat > 15  && lat < 72  && lng > -168 && lng < -52)  return 'usa';
    if (lat > -56 && lat < 15  && lng > -82  && lng < -34)  return 'latam';
    if (lat > 35  && lat < 72  && lng > -25  && lng < 45)   return 'europe';
    if (lat > 12  && lat < 42  && lng > 25   && lng < 65)   return 'gulf';
    if (lat > -35 && lat < 37  && lng > -18  && lng < 52)   return 'africa';
    if (lat > -10 && lat < 78  && lng > 60   && lng < 180)  return 'asia';
    if (lat > -50 && lat < -8  && lng > 108  && lng < 180)  return 'oceania';
    return null;
  }

  function flyToContinent(c) {
    if (!globe) return;
    isRotating = false;
    globe.controls().autoRotate = false;
    document.getElementById('pause-btn').textContent = '▶';
    document.getElementById('pause-btn').title = 'Resume rotation';
    document.getElementById('pause-btn').classList.add('paused');
    globe.pointOfView({ lat: c.lat, lng: c.lng, altitude: c.altitude }, 1200);
  }

  /* ── Globe init ── */
  let globe;
  try {
  globe = Globe({ animateIn: true })(document.getElementById('globe-wrap'))
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .showAtmosphere(true)
    .atmosphereColor('#38bdf8')
    .atmosphereAltitude(0.15)
    .ringsData([])
    .ringLat('lat').ringLng('lng')
    .ringColor(() => '#38bdf8')
    .ringMaxRadius(2.5).ringPropagationSpeed(3).ringRepeatPeriod(900)
    .onGlobeClick(({ lat, lng }) => {
      const region = detectContinent(lat, lng);
      if (!region) return;
      const c = CONTINENTS.find(c => c.region === region);
      if (c) flyToContinent(c);
    });

  try { globe.renderer().setPixelRatio(Math.min(window.devicePixelRatio, 2)); } catch(e) {}

  try {
    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.3;
    globe.controls().enableDamping = true;
    globe.controls().dampingFactor = 0.08;
    globe.controls().addEventListener('start', () => { globe.controls().autoRotate = false; });
    globe.controls().addEventListener('end',   () => { if (isRotating) setTimeout(() => { globe.controls().autoRotate = true; }, 3000); });
  } catch(e) {}

  globe.pointOfView({ lat: 20, lng: 10, altitude: 2.2 }, 0);
  document.getElementById('city-count').textContent = points.length;
  document.getElementById('globe-loading').style.display = 'none';
  window.addEventListener('resize', () => { globe.width(window.innerWidth).height(window.innerHeight); });
  } catch(globeErr) {
    console.error('Globe init error:', globeErr);
    document.getElementById('globe-loading').style.display = 'none';
  }

  /* ── Pause / Play ── */
  document.getElementById('pause-btn').addEventListener('click', () => {

  /* ── Search ── */
  const searchInput   = document.getElementById('globe-search');
  const searchResults = document.getElementById('search-results');

  function flyToCity(pt) {
    if (!globe) return;
    globe.controls().autoRotate = false;
    globe.pointOfView({ lat: pt.lat, lng: pt.lng, altitude: 1.5 }, 1000);
    setTimeout(() => openPanel(pt), 1050);
    searchInput.value = '';
    searchResults.classList.remove('show');
    if (isRotating) setTimeout(() => { if (globe) globe.controls().autoRotate = true; }, 6000);
  }

  function flyToContinent_search(c) {
    flyToContinent(c);
    searchInput.value = '';
    searchResults.classList.remove('show');
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchResults.classList.remove('show'); return; }

    const continentHits = CONTINENTS.filter(c => c.name.toLowerCase().includes(q));
    const cityHits = points.filter(p => p.name.toLowerCase().includes(q) || p.country.toLowerCase().includes(q)).slice(0, 7);

    if (!continentHits.length && !cityHits.length) { searchResults.classList.remove('show'); return; }

    searchResults.innerHTML = [
      ...continentHits.map(c =>
        `<div class="globe-search-result" data-continent="${c.region}">
           <span style="font-size:14px;line-height:1">${c.emoji}</span>
           <span class="globe-sr-name">${c.name}</span>
           <span class="globe-sr-country" style="color:${CONTINENT_COLORS[c.region]}">Region</span>
         </div>`),
      ...cityHits.map(p =>
        `<div class="globe-search-result" data-id="${p.id}">
           <span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>
           <span class="globe-sr-name">${p.name}</span>
           <span class="globe-sr-country">${p.country}</span>
         </div>`)
    ].join('');

    searchResults.classList.add('show');
    searchResults.querySelectorAll('.globe-search-result').forEach(el => {
      el.addEventListener('click', () => {
        if (el.dataset.continent) {
          flyToContinent_search(CONTINENTS.find(c => c.region === el.dataset.continent));
        } else {
          const pt = points.find(p => p.id === el.dataset.id);
          if (pt) flyToCity(pt);
        }
      });
    });
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = searchInput.value.trim().toLowerCase();
      const m = points.find(p => p.name.toLowerCase().startsWith(q));
      if (m) flyToCity(m);
    }
    if (e.key === 'Escape') { searchInput.value = ''; searchResults.classList.remove('show'); }
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('search-wrap').contains(e.target)) searchResults.classList.remove('show');
  });
})();
</script>
</body>
</html>
