<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Reset Password — Dropped</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #f0faf9; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #161b22; border: 1px solid rgba(45,212,191,.15); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; }
    .logo { font-size: 28px; font-weight: 800; color: #b8aec8; margin-bottom: 6px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 13px; color: rgba(240,250,249,.5); margin-bottom: 24px; line-height: 1.6; }
    label { display: block; font-size: 12px; font-weight: 600; color: rgba(240,250,249,.55); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    input { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 12px 14px; color: #f0faf9; font-size: 14px; font-family: inherit; outline: none; margin-bottom: 14px; }
    input:focus { border-color: rgba(45,212,191,.5); }
    button { width: 100%; background: linear-gradient(135deg,#5a9a98,#0891b2); border: none; border-radius: 10px; padding: 13px; color: #fff; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .msg { border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .msg.err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .msg.ok  { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.3); color: #34d399; }
    .back { text-align: center; margin-top: 18px; font-size: 13px; color: rgba(240,250,249,.4); }
    .back a { color: #b8aec8; text-decoration: none; }
    #loading { text-align: center; padding: 40px 0; color: rgba(240,250,249,.5); font-size: 14px; }
    #form { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">✈ Dropped</div>
    <h1>Set New Password</h1>
    <p>Choose a new password for your account.</p>

    <div id="loading">Verifying reset link…</div>

    <div id="form">
      <div id="err-msg" class="msg err"></div>
      <div id="ok-msg" class="msg ok">✓ Password updated! Redirecting…</div>
      <label for="new-pass">New Password</label>
      <input id="new-pass" type="password" placeholder="At least 8 characters" autocomplete="new-password">
      <label for="confirm-pass">Confirm Password</label>
      <input id="confirm-pass" type="password" placeholder="Repeat your new password" autocomplete="new-password">
      <button id="submit-btn" onclick="doReset()">Update Password</button>
    </div>

    <div class="back"><a href="/">← Back to Dropped</a></div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    let supabaseClient = null;
    const IS_CONFIGURED = typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL !== 'YOUR_SUPABASE_URL';

    function showErr(msg) {
      const el = document.getElementById('err-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function showForm() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('form').style.display = 'block';
    }

    function showInvalid(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('loading').textContent = '';
      const card = document.querySelector('.card');
      const p = document.createElement('p');
      p.style.color = '#f87171';
      p.style.textAlign = 'center';
      p.textContent = msg || 'Invalid or expired reset link. Please request a new one.';
      card.insertBefore(p, document.querySelector('.back'));
    }

    async function doReset() {
      const pass    = document.getElementById('new-pass').value;
      const confirm = document.getElementById('confirm-pass').value;
      const btn     = document.getElementById('submit-btn');
      document.getElementById('err-msg').style.display = 'none';
      if (pass.length < 8) { showErr('Password must be at least 8 characters.'); return; }
      if (pass !== confirm) { showErr('Passwords do not match.'); return; }
      btn.disabled = true;
      btn.textContent = 'Updating…';
      const { error } = await supabaseClient.auth.updateUser({ password: pass });
      if (error) {
        showErr(error.message);
        btn.disabled = false;
        btn.textContent = 'Update Password';
        return;
      }
      document.getElementById('ok-msg').style.display = 'block';
      document.getElementById('new-pass').style.display = 'none';
      document.getElementById('confirm-pass').style.display = 'none';
      btn.style.display = 'none';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    }

    if (!IS_CONFIGURED) {
      showInvalid('Auth is not configured on this deployment.');
    } else {
      try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        supabaseClient.auth.onAuthStateChange((event) => {
          if (event === 'PASSWORD_RECOVERY') {
            showForm();
          } else if (event === 'SIGNED_IN') {
            // In case the token was already consumed and user is now signed in
            showForm();
          }
        });
        // Fallback: if hash contains access_token directly (some Supabase versions)
        if (window.location.hash && window.location.hash.includes('access_token')) {
          setTimeout(showForm, 600);
        } else {
          // Show error if no hash at all (user navigated here directly)
          setTimeout(() => {
            if (document.getElementById('form').style.display === 'none') {
              showInvalid('Invalid or expired reset link. Please request a new one.');
            }
          }, 2000);
        }
      } catch (e) {
        showInvalid('Authentication unavailable.');
      }
    }
  </script>
</body>
</html>
