<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Reset Password — convotrek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #080c14; color: #f0faf9;
      font-family: 'Geist', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }

    /* ── grid decoration ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(rgba(151,172,224,.07) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, #080c14 100%);
    }

    /* ── theme toggle ── */
    .rp-theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      background: rgba(255,255,255,.06); border: 1px solid rgba(106,154,184,.2);
      border-radius: 20px; width: 52px; height: 28px;
      cursor: pointer; display: flex; align-items: center; padding: 3px;
      transition: background .2s;
    }
    .rp-theme-toggle:hover { background: rgba(255,255,255,.1); }
    .rp-knob {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(151,172,224,.2); border: 1px solid rgba(151,172,224,.3);
      display: flex; align-items: center; justify-content: center;
      transition: transform .3s; flex-shrink: 0; color: #97ace0;
    }
    body.light-mode .rp-knob { transform: translateX(24px); color: #f59e0b; }
    .rp-moon { display: block; }
    .rp-sun  { display: none; }
    body.light-mode .rp-moon { display: none; }
    body.light-mode .rp-sun  { display: block; }

    /* ── card ── */
    .card {
      background: rgba(255,255,255,.04); border: 1px solid rgba(106,154,184,.15);
      border-radius: 24px; padding: 44px 40px 40px;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.03);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }

    /* ── logo ── */
    .rp-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 28px;
    }
    .rp-logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(106,154,184,.15); border: 1px solid rgba(106,154,184,.25);
      display: flex; align-items: center; justify-content: center;
      color: #97ace0; flex-shrink: 0;
    }
    .rp-logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px; font-weight: 800; letter-spacing: -.3px; color: #f0faf9;
    }

    /* ── header text ── */
    h1 { font-size: 22px; font-weight: 800; letter-spacing: -.3px; color: #f0faf9; margin-bottom: 8px; }
    .rp-sub { font-size: 14px; color: rgba(240,250,249,.45); line-height: 1.6; margin-bottom: 28px; }

    /* ── divider ── */
    .rp-divider { height: 1px; background: rgba(106,154,184,.1); margin: 20px 0; }

    /* ── labels ── */
    label {
      display: block; font-size: 11px; font-weight: 700;
      color: rgba(240,250,249,.45); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .06em;
    }

    /* ── inputs ── */
    .rp-input-wrap { position: relative; margin-bottom: 16px; }
    input[type="password"] {
      width: 100%; background: rgba(255,255,255,.04);
      border: 1px solid rgba(106,154,184,.2); border-radius: 12px;
      padding: 12px 44px 12px 14px; color: #f0faf9;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .18s, background .18s;
    }
    input[type="password"]:focus { border-color: rgba(151,172,224,.5); background: rgba(255,255,255,.06); }
    .rp-eye {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: rgba(240,250,249,.3);
      display: flex; align-items: center; transition: color .15s; padding: 0;
    }
    .rp-eye:hover { color: rgba(240,250,249,.7); }

    /* ── password strength ── */
    .pw-strength { margin: -8px 0 16px; }
    .pw-strength-bar { height: 3px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
    .pw-strength-fill { height: 100%; border-radius: 3px; transition: width .3s, background .3s; width: 0; }
    .pw-strength-label { font-size: 11px; font-weight: 600; color: rgba(240,250,249,.35); }

    /* ── submit button ── */
    .rp-btn {
      width: 100%; background: linear-gradient(135deg, #6a9ab8 0%, #5283a0 100%);
      border: none; border-radius: 12px; padding: 14px;
      color: #fff; font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity .15s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 8px 24px rgba(106,154,184,.3);
    }
    .rp-btn:hover { opacity: .9; transform: translateY(-1px); }
    .rp-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── messages ── */
    .msg { border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .msg.err { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); color: #f87171; }
    .msg.ok  { background: rgba(52,211,153,.08); border: 1px solid rgba(52,211,153,.25); color: #34d399; display: flex; align-items: center; gap: 9px; }
    .msg.ok svg { flex-shrink: 0; }

    /* ── loading ── */
    #loading { text-align: center; padding: 32px 0; color: rgba(240,250,249,.4); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .load-spinner { width: 28px; height: 28px; border: 2px solid rgba(151,172,224,.15); border-top-color: #97ace0; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #form { display: none; }

    /* ── back link ── */
    .rp-back { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(240,250,249,.35); }
    .rp-back a { color: #97ace0; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: color .15s; }
    .rp-back a:hover { color: #f0faf9; }

    /* ── light mode ── */
    body.light-mode { background: #eef2f7; color: #0f172a; }
    body.light-mode body::before { background-image: radial-gradient(rgba(106,154,184,.1) 1px, transparent 1px); }
    body.light-mode .card { background: #fff; border-color: rgba(106,154,184,.2); box-shadow: 0 16px 48px rgba(0,0,0,.08); }
    body.light-mode .rp-logo-text { color: #0f172a; }
    body.light-mode h1 { color: #0f172a; }
    body.light-mode .rp-sub { color: rgba(15,23,42,.5); }
    body.light-mode label { color: rgba(15,23,42,.45); }
    body.light-mode input[type="password"] { background: #f8fafc; border-color: rgba(106,154,184,.25); color: #0f172a; }
    body.light-mode input[type="password"]:focus { border-color: rgba(82,131,160,.5); background: #fff; }
    body.light-mode .rp-back { color: rgba(15,23,42,.4); }
    body.light-mode .rp-back a { color: #5283a0; }
    body.light-mode .rp-back a:hover { color: #0f172a; }
    body.light-mode .rp-divider { background: rgba(106,154,184,.15); }
    body.light-mode .pw-strength-bar { background: rgba(0,0,0,.06); }
    body.light-mode .pw-strength-label { color: rgba(15,23,42,.4); }
    body.light-mode .rp-theme-toggle { background: rgba(0,0,0,.05); border-color: rgba(106,154,184,.25); }
    body.light-mode .rp-logo-icon { background: rgba(82,131,160,.1); border-color: rgba(82,131,160,.2); color: #5283a0; }
    body.light-mode #loading { color: rgba(15,23,42,.4); }
  </style>
</head>
<body>

<!-- Theme toggle -->
<button class="rp-theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
  <div class="rp-knob">
    <svg class="rp-moon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    <svg class="rp-sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/></svg>
  </div>
</button>

<div class="card">

  <!-- Logo -->
  <a href="/" class="rp-logo">
    <div class="rp-logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7 4.8 5.2A1 1 0 004 6l3.8 6.8-3.5 3.5c-.4.4-.4 1 0 1.4l1 1c.4.4 1 .4 1.4 0l3.5-3.5L17 18a1 1 0 001 .8h.2a1 1 0 00.6-1.6z"/></svg>
    </div>
    <span class="rp-logo-text">convotrek</span>
  </a>

  <h1>Set New Password</h1>
  <p class="rp-sub">Choose a strong new password for your account. You'll be redirected after updating.</p>

  <div class="rp-divider"></div>

  <!-- Loading state -->
  <div id="loading">
    <div class="load-spinner"></div>
    Verifying reset link…
  </div>

  <!-- Form (shown after link verified) -->
  <div id="form">
    <div id="err-msg" class="msg err"></div>
    <div id="ok-msg" class="msg ok">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Password updated! Redirecting you now…
    </div>

    <label for="new-pass">New Password</label>
    <div class="rp-input-wrap">
      <input id="new-pass" type="password" placeholder="At least 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
      <button type="button" class="rp-eye" onclick="toggleVis('new-pass',this)" tabindex="-1" aria-label="Show password">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="pw-strength" id="pw-strength" style="display:none">
      <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-fill"></div></div>
      <div class="pw-strength-label" id="pw-label"></div>
    </div>

    <label for="confirm-pass">Confirm Password</label>
    <div class="rp-input-wrap">
      <input id="confirm-pass" type="password" placeholder="Repeat your new password" autocomplete="new-password">
      <button type="button" class="rp-eye" onclick="toggleVis('confirm-pass',this)" tabindex="-1" aria-label="Show password">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <button id="submit-btn" class="rp-btn" onclick="doReset()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Update Password
    </button>
  </div>

  <div class="rp-back">
    <a href="/">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to convotrek
    </a>
  </div>

</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
let supabaseClient = null;
const IS_CONFIGURED = typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL !== 'YOUR_SUPABASE_URL';

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function showForm() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('form').style.display = 'block';
}
function showInvalid(msg) {
  const loading = document.getElementById('loading');
  loading.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span style="color:#f87171;font-size:14px;text-align:center;max-width:280px;">${msg || 'Invalid or expired reset link. Please request a new one.'}</span>`;
}

function toggleVis(id, btn) {
  const inp = document.getElementById(id);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  btn.style.color = isText ? '' : 'rgba(240,250,249,.7)';
}

function checkStrength(pw) {
  const wrap = document.getElementById('pw-strength');
  const fill = document.getElementById('pw-fill');
  const lbl  = document.getElementById('pw-label');
  if (!pw) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  let score = 0;
  if (pw.length >= 8) score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const labels = ['Too short', 'Weak', 'Fair', 'Good', 'Strong', 'Very strong'];
  const colors = ['#ef4444','#ef4444','#fbbf24','#60a5fa','#34d399','#34d399'];
  fill.style.width = Math.round((score / 5) * 100) + '%';
  fill.style.background = colors[score] || colors[0];
  lbl.textContent = labels[score] || '';
  lbl.style.color = colors[score] || colors[0];
}

async function doReset() {
  const pass    = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  const btn     = document.getElementById('submit-btn');
  document.getElementById('err-msg').style.display = 'none';
  if (pass.length < 8) { showErr('Password must be at least 8 characters.'); return; }
  if (pass !== confirm) { showErr('Passwords do not match.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></div>Updating…';
  const { error } = await supabaseClient.auth.updateUser({ password: pass });
  if (error) {
    showErr(error.message);
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Update Password';
    return;
  }
  document.getElementById('ok-msg').style.display = 'flex';
  document.getElementById('new-pass').closest('.rp-input-wrap').style.display = 'none';
  document.getElementById('confirm-pass').closest('.rp-input-wrap').style.display = 'none';
  document.getElementById('pw-strength').style.display = 'none';
  document.querySelectorAll('label').forEach(l => l.style.display = 'none');
  btn.style.display = 'none';
  setTimeout(() => { window.location.href = '/'; }, 2200);
}

if (!IS_CONFIGURED) {
  showInvalid('Auth is not configured on this deployment.');
} else {
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') showForm();
    });
    if (window.location.hash && window.location.hash.includes('access_token')) {
      setTimeout(showForm, 600);
    } else {
      setTimeout(() => {
        if (document.getElementById('form').style.display === 'none') {
          showInvalid('Invalid or expired reset link. Please request a new one.');
        }
      }, 2000);
    }
  } catch (e) {
    showInvalid('Authentication unavailable. Please try again later.');
  }
}
</script>
<script src="theme.js"></script>
</body>
</html>
